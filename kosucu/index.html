<!doctype html>
<html lang="tr">
<meta charset="utf-8">
<title>SONSUZ KOŞU — Kaç, Topla, Rekor Kır</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  :root{ --bg:#2b1e4f; --ink:#f5f0ff; --dim:#a795d4; --gold:#ffd166; --run:#ff6b9a; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:"Avenir Next","Futura","Trebuchet MS",system-ui,sans-serif;
    -webkit-user-select:none;user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent}
  canvas{display:block;width:100%;height:100%}
  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;
    padding:12px 16px;pointer-events:none}
  .label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);font-weight:700}
  .value{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;
    text-shadow:0 2px 10px rgba(255,107,154,.4)}
  .card{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;text-align:center;background:rgba(43,30,79,.94);
    transition:opacity .3s;padding:24px;z-index:10}
  .card.hidden{opacity:0;pointer-events:none;visibility:hidden;transition:opacity .3s,visibility 0s .3s}
  .card.hidden .btn{pointer-events:none}
  .card h1{font-size:clamp(38px,10vw,80px);font-weight:900;line-height:.96;
    background:linear-gradient(180deg,#ffd166,#ff6b9a);
    -webkit-background-clip:text;background-clip:text;color:transparent;transform:rotate(-2deg)}
  .card p{max-width:34ch;color:var(--dim);font-size:15px;line-height:1.5}
  .card .big{font-size:34px;font-weight:800;color:var(--gold)}
  .btn{font:inherit;font-weight:800;font-size:16px;letter-spacing:.08em;text-transform:uppercase;
    color:#2b1e4f;background:linear-gradient(180deg,#ffd166,#ffb03a);border:none;border-radius:999px;
    padding:14px 38px;cursor:pointer;box-shadow:0 5px 0 #b3701e}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #b3701e}
  .btn:focus-visible{outline:3px solid var(--ink);outline-offset:3px}
  .hint{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
</style>

<canvas id="cv"></canvas>
<div id="hud">
  <div><div class="label">Mesafe</div><div class="value" id="distEl">0m</div></div>
  <div style="text-align:right"><div class="label">Altın</div><div class="value" id="coinEl">🪙 0</div></div>
</div>

<div class="card" id="intro">
  <h1>SONSUZ KOŞU</h1>
  <p>Kaydırarak şerit değiştir, yukarı kaydırıp engellerin üstünden atla. Ne kadar uzağa koşabilirsin? Reklamsız, ücretsiz! 🏃</p>
  <button class="btn" id="startBtn">Koş!</button>
  <span class="hint" id="bestIntro"></span>
</div>

<div class="card hidden" id="endcard">
  <h1 style="background:linear-gradient(180deg,#ff8f7a,#e84a5f);-webkit-background-clip:text;background-clip:text">Tökezledin!</h1>
  <div class="big" id="endScore"></div>
  <p id="endMsg"></p>
  <button class="btn" id="retryBtn">Tekrar Koş</button>
</div>

<script>
'use strict';
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();

let AC=null;
const audio=()=>{ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended')AC.resume(); return AC; };
function blip(f,d=0.08,v=0.15,t='triangle'){ try{ const a=audio(),n=a.currentTime,o=a.createOscillator(),g=a.createGain();
  o.type=t;o.frequency.setValueAtTime(f,n);o.frequency.exponentialRampToValueAtTime(f*1.4,n+d);
  g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(0.001,n+d);
  o.connect(g).connect(a.destination);o.start(n);o.stop(n+d+0.02);}catch(e){} }
const buzz=ms=>{ try{ navigator.vibrate&&navigator.vibrate(ms); }catch(e){} };

/* 3 şerit; engeller ve altınlar yukarıdan gelir (perspektif hissi ölçekle) */
let lane=1, laneX=1, jumpT=0, dist=0, coins=0, speed=6, objs=[], state='intro', tick=0, spawnT=0;
let best=0; try{ best=+localStorage.getItem('kosucu_best')||0; }catch(e){}
document.getElementById('bestIntro').textContent=best>0?'REKORUN: '+best+'m':'';

const laneW=()=>Math.min(W*0.26,150);
const laneCX=l=>W/2+(l-1)*laneW();
const PLAYER_Y=()=>H*0.78;

function reset(){ lane=1; laneX=1; jumpT=0; dist=0; coins=0; speed=6; objs=[]; spawnT=0; updHud(); }
function updHud(){
  document.getElementById('distEl').textContent=Math.floor(dist)+'m';
  document.getElementById('coinEl').textContent='🪙 '+coins;
}
function spawn(){
  const roll=Math.random();
  const l=Math.floor(Math.random()*3);
  if(roll<0.45){ objs.push({type:'block',lane:l,y:-80,h:1}); }        // zıplanmaz, şerit değiştir
  else if(roll<0.7){ objs.push({type:'low',lane:l,y:-80}); }          // üstünden atla
  else { for(let i=0;i<4;i++) objs.push({type:'coin',lane:l,y:-80-i*70}); }
  // aynı sırada 3 şerit de kapanmasın: garanti açık şerit
  const rowBlocks=objs.filter(o=>o.type!=='coin'&&o.y<-40);
  if(rowBlocks.length>=2){
    const used=new Set(rowBlocks.map(o=>o.lane));
    if(used.size>=3) objs=objs.filter(o=>!(o.type!=='coin'&&o.y<-40&&o.lane===l));
  }
}
function physics(){
  tick++;
  speed=Math.min(15,6+dist/220);
  dist+=speed*0.04;
  laneX+=(lane-laneX)*0.25;
  if(jumpT>0) jumpT--;
  spawnT-=speed;
  if(spawnT<=0){ spawn(); spawnT=150+Math.random()*130; }
  for(const o of objs){ o.y+=speed; }
  const py=PLAYER_Y();
  for(const o of objs){
    if(o.hit) continue;
    if(Math.abs(o.y-py)<34&&Math.abs(o.lane-laneX)<0.45){
      if(o.type==='coin'){ o.hit=true; coins++; updHud(); blip(880,0.07,0.12); buzz(6); }
      else if(o.type==='low'&&jumpT>0){ /* üstünden atladı */ }
      else { crash(); return; }
    }
  }
  objs=objs.filter(o=>!o.hit&&o.y<H+120);
  if(Math.floor(dist)%10===0) updHud();
}
function crash(){
  state='over'; blip(120,0.4,0.2,'sawtooth'); buzz(90);
  const total=Math.floor(dist);
  const nb=total>best; if(nb){ best=total; try{localStorage.setItem('kosucu_best',best);}catch(e){} }
  document.getElementById('endScore').textContent=total+'m · 🪙 '+coins;
  document.getElementById('endMsg').textContent=(nb?'YENİ REKOR! 🏆':'Rekor: '+best+'m')
    +' — Alçak engellerin üstünden yukarı kaydırarak atlayabilirsin.';
  document.getElementById('endcard').classList.remove('hidden');
}

function draw(){
  // yol perspektifi
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1c1438'); g.addColorStop(1,'#3d2b6b');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // yıldızlar
  ctx.fillStyle='rgba(245,240,255,.5)';
  for(let i=0;i<24;i++){ const sx=(i*97)%W, sy=(i*61+tick*0.3)%(H*0.4);
    ctx.fillRect(sx,sy,2,2); }
  // yol
  const roadTopW=laneW()*1.1, roadBotW=laneW()*3.4;
  ctx.fillStyle='#4a3a80';
  ctx.beginPath();
  ctx.moveTo(W/2-roadTopW,0); ctx.lineTo(W/2+roadTopW,0);
  ctx.lineTo(W/2+roadBotW,H); ctx.lineTo(W/2-roadBotW,H); ctx.fill();
  // şerit çizgileri (kayan)
  ctx.strokeStyle='rgba(245,240,255,.35)'; ctx.lineWidth=4; ctx.setLineDash([26,30]);
  ctx.lineDashOffset=-(tick*speed)%56;
  for(const l of [0.5,1.5]){
    const tx=W/2+(l-1.5)*roadTopW, bx=W/2+(l-1.5)*roadBotW*0.667*2/2;
    ctx.beginPath(); ctx.moveTo(W/2+(l-1.5)*roadTopW*1.0,0);
    ctx.lineTo(W/2+(l-1.5)*roadBotW*0.667,H); ctx.stroke();
  }
  ctx.setLineDash([]);
  // nesneler (uzaklık ölçeği: y küçükken küçük)
  const scaleAt=y=>0.35+0.65*Math.max(0,Math.min(1,y/H));
  objs.sort((a,b)=>a.y-b.y);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(const o of objs){
    const s=scaleAt(o.y);
    const x=W/2+(o.lane-1)*laneW()*(0.4+0.6*s)* (o.y/H<0?0.4:1);
    const lx=W/2+(o.lane-1)*laneW()*(0.35+0.65*s);
    if(o.type==='coin'){ ctx.font=(34*s)+'px system-ui'; ctx.fillText('🪙',lx,o.y); }
    else if(o.type==='low'){
      ctx.fillStyle='#e84a5f';
      const w=laneW()*0.8*s, h=26*s;
      ctx.fillRect(lx-w/2,o.y-h/2,w,h);
      ctx.fillStyle='#fff'; for(let i=0;i<3;i++) ctx.fillRect(lx-w/2+6+i*w/3,o.y-h/2+4,w/3-8,h-8);
    } else {
      const w=laneW()*0.85*s, h=90*s;
      ctx.fillStyle='#5f4a9e'; ctx.fillRect(lx-w/2+3,o.y-h+5,w,h);
      ctx.fillStyle='#8a6fd4'; ctx.fillRect(lx-w/2,o.y-h,w,h);
      ctx.fillStyle='#ffd166';
      ctx.font='900 '+(22*s)+'px system-ui'; ctx.fillText('⚠️',lx,o.y-h/2);
    }
  }
  // oyuncu
  const px=W/2+(laneX-1)*laneW(), py=PLAYER_Y();
  const jump= jumpT>0 ? Math.sin((28-jumpT)/28*Math.PI)*70 : 0;
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.beginPath(); ctx.ellipse(px,py+22,26-jump*0.15,8,0,0,6.28); ctx.fill();
  ctx.save(); ctx.translate(px,py-jump);
  const lean=(lane-laneX)*0.5;
  ctx.rotate(-lean*0.3);
  const bg2=ctx.createLinearGradient(0,-40,0,20);
  bg2.addColorStop(0,'#ff9ab8'); bg2.addColorStop(1,'#ff6b9a');
  ctx.fillStyle=bg2;
  ctx.beginPath(); ctx.moveTo(0,-44);
  ctx.bezierCurveTo(20,-36,22,4,0,16);
  ctx.bezierCurveTo(-22,4,-20,-36,0,-44); ctx.fill();
  ctx.fillStyle='#ffd166';                       // kask
  ctx.beginPath(); ctx.arc(0,-34,14,Math.PI,0); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-5,-24,4.5,0,6.28); ctx.arc(5,-24,4.5,0,6.28); ctx.fill();
  ctx.fillStyle='#2b1e4f';
  ctx.beginPath(); ctx.arc(-4,-23,2.2,0,6.28); ctx.arc(6,-23,2.2,0,6.28); ctx.fill();
  if(jumpT<=0){                                   // koşu bacakları
    ctx.strokeStyle='#e84a7f'; ctx.lineWidth=5; ctx.lineCap='round';
    const ph=Math.sin(tick*0.5)*8;
    ctx.beginPath(); ctx.moveTo(-6,14); ctx.lineTo(-6+ph,26);
    ctx.moveTo(6,14); ctx.lineTo(6-ph,26); ctx.stroke();
  }
  ctx.restore();
}
function loop(){ if(state==='play') physics(); draw(); requestAnimationFrame(loop); }

/* girdi */
function goLane(d){ if(state!=='play')return; lane=Math.max(0,Math.min(2,lane+d)); blip(300,0.05,0.1); }
function jump(){ if(state==='play'&&jumpT<=0){ jumpT=28; blip(420,0.1,0.14); buzz(8); } }
addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft')goLane(-1); if(e.code==='ArrowRight')goLane(1);
  if(e.code==='ArrowUp'||e.code==='Space'){ jump(); e.preventDefault(); }
});
let tX=null,tY=null;
addEventListener('touchstart',e=>{ if(e.target.closest('.card'))return;
  const t=e.changedTouches[0]; tX=t.clientX; tY=t.clientY; audio(); },{passive:true});
addEventListener('touchend',e=>{
  if(tX===null) return;
  const t=e.changedTouches[0], dx=t.clientX-tX, dy=t.clientY-tY;
  tX=tY=null;
  if(Math.abs(dx)<24&&Math.abs(dy)<24) return;
  if(Math.abs(dx)>Math.abs(dy)) goLane(dx>0?1:-1);
  else if(dy<0) jump();
});
document.addEventListener('visibilitychange',()=>{ if(document.hidden&&state==='play'){} });

function tap(el,fn){ el._fn=fn;
  const fire=e=>{ e.preventDefault(); e.stopPropagation(); if(el._fn)el._fn(); };
  el.addEventListener('click',fire); el.addEventListener('touchend',fire); }
tap(document.getElementById('startBtn'),()=>{ try{audio();}catch(e){}
  reset(); state='play';
  document.getElementById('intro').classList.add('hidden'); });
tap(document.getElementById('retryBtn'),()=>{ reset(); state='play';
  document.getElementById('endcard').classList.add('hidden'); });
reset(); loop();
</script>
