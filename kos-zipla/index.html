<!doctype html>
<html lang="tr">
<meta charset="utf-8">
<title>KOŞ ZIPLA — Platform Macerası</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  :root{ --sky1:#7ec8ff; --sky2:#cdeeff; --ink:#243447; --dim:#5a7ca0;
    --grass:#5fc86e; --dirt:#a5683c; --accent:#ff8c42; --gold:#ffc93c; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--sky1);
    font-family:"Avenir Next","Futura","Trebuchet MS",system-ui,sans-serif;
    -webkit-user-select:none;user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent}
  canvas{display:block;width:100%;height:100%}
  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;
    padding:12px 16px;pointer-events:none;color:var(--ink)}
  .hudbox{display:flex;flex-direction:column;gap:1px}
  .hudbox.right{align-items:flex-end}
  .label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);font-weight:700}
  .value{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1}
  #controls{position:fixed;left:0;right:0;bottom:0;height:180px;display:none;pointer-events:none}
  body.touch #controls{display:flex}
  #dpad{pointer-events:auto;flex:1.2;display:flex;align-items:flex-end;gap:12px;
    padding:0 0 calc(16px + env(safe-area-inset-bottom)) 16px}
  #jumpZone{pointer-events:auto;flex:1;display:flex;align-items:flex-end;justify-content:flex-end;
    padding:0 16px calc(16px + env(safe-area-inset-bottom)) 0}
  .ctl{width:84px;height:84px;border-radius:24px;background:rgba(36,52,71,.12);
    border:2px solid rgba(36,52,71,.25);color:var(--ink);font-size:32px;
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);
    transition:transform .08s,background .08s}
  .ctl.on{background:rgba(255,140,66,.4);border-color:var(--accent);transform:scale(1.06)}
  #jumpBtn{width:104px;height:104px;border-radius:50%;font-size:15px;font-weight:800;letter-spacing:.08em}
  #pauseBtn{position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:5;font-size:15px;
    color:var(--dim);background:rgba(36,52,71,.08);border:1.5px solid rgba(36,52,71,.25);
    border-radius:999px;padding:8px 15px;cursor:pointer;display:none;font-weight:700}
  #pauseBtn.show{display:block}
  .card{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;text-align:center;color:var(--ink);
    background:linear-gradient(180deg,rgba(205,238,255,.95),rgba(126,200,255,.95));
    transition:opacity .35s;padding:24px;z-index:10}
  .card.hidden{opacity:0;pointer-events:none;visibility:hidden;transition:opacity .35s,visibility 0s .35s}
  .card.hidden .btn{pointer-events:none}
  .card h1{font-size:clamp(40px,11vw,88px);font-weight:900;line-height:.95;
    color:#fff;text-shadow:0 4px 0 var(--accent),0 8px 24px rgba(255,140,66,.5);transform:rotate(-2deg)}
  .card p{max-width:36ch;color:var(--ink);font-size:15px;line-height:1.5}
  .card .big{font-size:32px;font-weight:800;color:var(--accent)}
  .btn{pointer-events:auto;font:inherit;font-weight:800;font-size:16px;letter-spacing:.08em;
    text-transform:uppercase;color:#fff;background:linear-gradient(180deg,#ff8c42,#f26419);
    border:none;border-radius:999px;padding:14px 38px;cursor:pointer;box-shadow:0 5px 0 #b34a12}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #b34a12}
  .btn:focus-visible{outline:3px solid var(--ink);outline-offset:3px}
  .lvlrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .lvl{width:52px;height:52px;border-radius:14px;border:2px solid rgba(36,52,71,.3);
    background:#fff;font:inherit;font-size:18px;font-weight:800;color:var(--ink);cursor:pointer}
  .lvl.lock{opacity:.35;pointer-events:none}
  .lvl:active{background:var(--gold)}
</style>

<canvas id="cv"></canvas>
<div id="hud">
  <div class="hudbox"><span class="label">Altın</span><span class="value" id="coinEl">🪙 0</span></div>
  <div class="hudbox"><span class="label">Bölüm</span><span class="value" id="lvlEl">1</span></div>
  <div class="hudbox right"><span class="label">Can</span><span class="value" id="lifeEl">❤️❤️❤️</span></div>
</div>
<button id="pauseBtn">⏸ mola</button>
<div id="controls">
  <div id="dpad"><div class="ctl" id="leftBtn">◀</div><div class="ctl" id="rightBtn">▶</div></div>
  <div id="jumpZone"><div class="ctl" id="jumpBtn">ZIPLA</div></div>
</div>

<div class="card" id="intro">
  <h1>KOŞ ZIPLA</h1>
  <p>Altınları topla, sümüklülerin kafasına zıpla, bayrağa ulaş! İlerlemen kaydedilir — açtığın bölümden devam et.</p>
  <div class="lvlrow" id="lvlRow"></div>
  <span style="font-size:12px;letter-spacing:.12em;color:var(--dim)" id="ctlHint"></span>
</div>

<div class="card hidden" id="endcard">
  <h1 id="endTitle"></h1>
  <div class="big" id="endStat"></div>
  <p id="endMsg"></p>
  <button class="btn" id="nextBtn"></button>
  <button class="btn" id="menuBtn" style="background:linear-gradient(180deg,#8ecae6,#3a86c8);box-shadow:0 5px 0 #1e5a8a">Bölümler</button>
</div>

<div class="card hidden" id="pausecard">
  <h1>Mola</h1>
  <button class="btn" id="resumeBtn">Devam</button>
  <button class="btn" id="quitBtn" style="background:linear-gradient(180deg,#8ecae6,#3a86c8);box-shadow:0 5px 0 #1e5a8a">Bölümler</button>
</div>

<script>
'use strict';
/* harita: # zemin, = platform, B tuğla, C altın, E düşman, F bayrak, P başlangıç */
const LEVELS=[
[ '                                                                                ',
  '                                                                                ',
  '                                                                       F        ',
  '                                       C C C                           #        ',
  '                  C                   =====                            #        ',
  '            C    ===       C C                    C C      E           #        ',
  '           ===        C   =====    E          B B B B B               ##        ',
  '     P          E    ===         ####    C                    E      ###        ',
  '   #####   ########       ##   ######   ===   ########   #########  ####        ',
  '   #####   ########  ##   ##   ######         ########   ##############        ',
],
[ '                                                                                        ',
  '                C C C                                                                   ',
  '               =======        C                              C C C            F         ',
  '                             ===         B C B                =====           #         ',
  '        C C        E                    =======    E E                  C     #         ',
  '       =====     #####          C                 ======      E        ===   ##         ',
  '   P            ##   ##        ===   E                       ====            ###        ',
  '  ####   C C   ##     ##            ####   C C C                       E    #####       ',
  '  ####  ####  ##       ##  ###     #####  =====     ###   E E        ############       ',
  '  ####  ####  ##       ##  ###     #####            ### #######      ############       ',
],
[ '                                                                                              ',
  '     C                  C C                 B B B                 C C C                       ',
  '    ===       C        =====        C                    E                        F           ',
  '             ===                   ===     C C     C   ======        =====        #           ',
  '  P     E          E         E            =====   ===           C            C   ##           ',
  ' ####  =====     ====      ####    E E                    B B  ===    E     === ###           ',
  ' ####          C          ##  ##  ######      E E                    ####       ###           ',
  ' ####   E    ====        ##    ##          ########   E E E     C           E  ####           ',
  ' ##########       ##    ##      ##  ####  ##########  ########  ==== ##############           ',
  ' ##########  ###  ##   ##        ## ####  ##########  ########       ##############           ',
],
[ '                                                                                          ',
  '         C C C                        C C C                                               ',
  '        =======          B C B       =======         C C C          E E          F        ',
  '                                                    =======       ======         #        ',
  '   P    E          C C          E              E                                ##        ',
  '  ####  ====      =====      ======    C     ====      E       C C     E      ####        ',
  '  ####          E         C          =====           ====     ====   #####   #####        ',
  '  ####   C C  ######     ===    E             E E                             #####       ',
  '  ####  ===== ######    ####  #######    C  ######   ######  ###### ##############       ',
  '  ####        ######    ####  #######  ===  ######   ######  ###### ##############       '],
[ '                                                                                               ',
  '     C            B B B            C C C          E                C            F              ',
  '    ===                           =======      =======           ===           #              ',
  '          C C           C C                                C                        E         ',
  '   P     =====     E   =====    E        C C      E       ===    E     C C        ###         ',
  '  ####          ####          =====     =====   =====          ====   =====      ####         ',
  '  ####   E     ##  ##    C            E              C    E           E         #####         ',
  '  ####  ====  ##    ##  ===  E E    ######   E    E ==== ######   C       C    ######         ',
  '  #########   ##    ## ##### ###### ######  ###### #### ####### ##### ##### #########         ',
  '  #########   ##    ## ##### ###### ######  ###### #### ####### ##### ##### #########         '],
];
const T=42;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();
const IS_TOUCH=matchMedia('(pointer:coarse)').matches||'ontouchstart' in window;
if(IS_TOUCH) document.body.classList.add('touch');
document.getElementById('ctlHint').textContent = IS_TOUCH?'◀ ▶ koş · ZIPLA':'← → koş · Boşluk zıpla';

let AC=null;
const audio=()=>{ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended')AC.resume(); return AC; };
function blip(f,d=0.08,v=0.18,t='square'){ try{ const a=audio(),n=a.currentTime,o=a.createOscillator(),g=a.createGain();
  o.type=t;o.frequency.setValueAtTime(f,n);o.frequency.exponentialRampToValueAtTime(f*1.5,n+d);
  g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(0.001,n+d);
  o.connect(g).connect(a.destination);o.start(n);o.stop(n+d+0.02);}catch(e){} }
const buzz=ms=>{ try{ navigator.vibrate&&navigator.vibrate(ms); }catch(e){} };

/* ilerleme kaydı */
let prog={unlocked:1,coins:0};
try{ const s=JSON.parse(localStorage.getItem('koszipla_prog')); if(s&&s.unlocked) prog=s; }catch(e){}
function saveProg(){ try{ localStorage.setItem('koszipla_prog',JSON.stringify(prog)); }catch(e){} }

let map, mw, mh, P, enemies, coins, flag, camX, lives, coinCount, curLevel=1, state='intro', tick=0, particles=[];
const keys={L:false,R:false,J:false};
let jumpBuf=0, coyote=0;

function parseLevel(n){
  const rows=LEVELS[n-1];
  mh=rows.length; mw=Math.max(...rows.map(r=>r.length));
  map=rows.map(r=>r.padEnd(mw,' ').split(''));
  enemies=[]; coins=[]; flag=null; particles=[];
  for(let y=0;y<mh;y++)for(let x=0;x<mw;x++){
    const c=map[y][x];
    if(c==='P'){ P={x:x*T+T/2,y:y*T,vx:0,vy:0,w:26,h:36,ground:false,face:1}; map[y][x]=' '; }
    if(c==='E'){ enemies.push({x:x*T+T/2,y:y*T+T-14,vx:-1.1,w:30,h:26,dead:0}); map[y][x]=' '; }
    if(c==='C'){ coins.push({x:x*T+T/2,y:y*T+T/2,got:false}); map[y][x]=' '; }
    if(c==='F'){ flag={x:x*T+T/2,y:y*T}; map[y][x]=' '; }
  }
  camX=0; coinCount=0;
}
function solid(c){ return c==='#'||c==='='||c==='B'; }
function tileAt(px,py){ const x=Math.floor(px/T), y=Math.floor(py/T);
  if(x<0||x>=mw) return '#'; if(y<0) return ' '; if(y>=mh) return ' ';
  return map[y][x]; }

function startLevel(n){
  curLevel=n; lives=3; parseLevel(n);
  document.getElementById('lvlEl').textContent=n;
  updHud(); state='play'; setPause(true);
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('endcard').classList.add('hidden');
}
function updHud(){
  document.getElementById('coinEl').textContent='🪙 '+coinCount;
  document.getElementById('lifeEl').textContent='❤️'.repeat(Math.max(0,lives));
}
function respawn(){
  lives--; updHud(); buzz(60);
  if(lives<=0){ endLevel(false); return; }
  parseLevel(curLevel); updHud();
}
function endLevel(won){
  state='over'; setPause(false);
  const t=document.getElementById('endTitle'), m=document.getElementById('endMsg'),
        s=document.getElementById('endStat'), nb=document.getElementById('nextBtn');
  if(won){
    prog.coins+=coinCount;
    if(curLevel>=prog.unlocked&&curLevel<LEVELS.length) prog.unlocked=curLevel+1;
    saveProg();
    t.textContent='Bayrak! 🚩'; s.textContent='🪙 '+coinCount+' altın';
    if(curLevel<LEVELS.length){ m.textContent='Bölüm '+(curLevel+1)+' açıldı!';
      nb.style.display=''; nb.textContent='Sonraki Bölüm';
      nb._fn=()=>startLevel(curLevel+1);
    } else { m.textContent='Tüm bölümleri bitirdin! Toplam kasan: 🪙 '+prog.coins;
      nb.style.display='none'; }
    blip(523,0.3,0.2,'triangle'); blip(659,0.3,0.15,'triangle');
  } else {
    t.textContent='Oyun Bitti 😵'; s.textContent='🪙 '+coinCount;
    m.textContent='Sümüklülere dikkat — kafalarına zıplayabilirsin ama yandan dokunma!';
    nb.style.display=''; nb.textContent='Tekrar Dene'; nb._fn=()=>startLevel(curLevel);
  }
  document.getElementById('endcard').classList.remove('hidden');
}

function physics(){
  tick++;
  if(jumpBuf>0)jumpBuf--;
  if(coyote>0)coyote--;
  const ACC=0.6, MAXV=5.2, FRIC=0.82, GRAV=0.62, JV=13.6;
  if(keys.L){ P.vx-=ACC; P.face=-1; }
  if(keys.R){ P.vx+=ACC; P.face=1; }
  if(!keys.L&&!keys.R) P.vx*=FRIC;
  P.vx=Math.max(-MAXV,Math.min(MAXV,P.vx));
  if(jumpBuf>0&&(P.ground||coyote>0)){
    P.vy=-JV; P.ground=false; coyote=0; jumpBuf=0; blip(320,0.12,0.15); buzz(6);
  }
  if(!keys.J&&P.vy<-4) P.vy=-4;              // kısa/uzun zıplama
  P.vy=Math.min(P.vy+GRAV,14);
  // x ekseni
  P.x+=P.vx;
  for(const sx of [-P.w/2,P.w/2]){
    for(const sy of [-P.h+4,-P.h/2,-2]){
      if(solid(tileAt(P.x+sx,P.y+sy))){
        P.x = sx<0 ? Math.floor((P.x+sx)/T+1)*T+P.w/2 : Math.floor((P.x+sx)/T)*T-P.w/2-0.01;
        P.vx=0;
      } } }
  // y ekseni
  P.y+=P.vy;
  const wasGround=P.ground; P.ground=false;
  if(P.vy>=0){
    for(const sx of [-P.w/2+3,P.w/2-3]){
      const c=tileAt(P.x+sx,P.y);
      if(solid(c)){ P.y=Math.floor(P.y/T)*T-0.01; P.vy=0; P.ground=true; }
    }
  } else {
    for(const sx of [-P.w/2+3,P.w/2-3]){
      const ty=P.y-P.h;
      const c=tileAt(P.x+sx,ty);
      if(solid(c)){
        P.y=Math.floor(ty/T+1)*T+P.h+0.01; P.vy=0;
        const bx=Math.floor((P.x+sx)/T), by=Math.floor(ty/T);
        if(map[by][bx]==='B'){ map[by][bx]=' '; coinCount++; updHud();
          blip(700,0.1,0.15,'triangle');
          for(let i=0;i<8;i++) particles.push({x:bx*T+T/2,y:by*T+T/2,
            vx:(Math.random()-.5)*5,vy:-Math.random()*5,life:1,col:'#a5683c',size:5}); }
      } } }
  if(wasGround&&!P.ground&&P.vy>=0) coyote=6;
  if(P.y>mh*T+80) respawn();
  // altın
  for(const c of coins){ if(!c.got&&Math.abs(P.x-c.x)<24&&Math.abs(P.y-P.h/2-c.y)<30){
    c.got=true; coinCount++; updHud(); blip(880,0.09,0.13,'triangle');
    for(let i=0;i<6;i++) particles.push({x:c.x,y:c.y,vx:(Math.random()-.5)*3,vy:-Math.random()*3,
      life:0.8,col:'#ffc93c',size:3}); } }
  // düşmanlar
  for(const e of enemies){
    if(e.dead){ e.dead++; continue; }
    e.x+=e.vx;
    const ahead=e.vx<0?-e.w/2-2:e.w/2+2;
    if(solid(tileAt(e.x+ahead,e.y-4)) || !solid(tileAt(e.x+ahead,e.y+8))) e.vx*=-1;
    if(Math.abs(P.x-e.x)<(P.w+e.w)/2-4 && P.y>e.y-e.h && P.y-P.h<e.y){
      if(P.vy>1.5 && P.y-P.h/2<e.y-e.h/2){
        e.dead=1; P.vy=-8; coinCount+=2; updHud(); blip(200,0.1,0.2); buzz(20);
        for(let i=0;i<10;i++) particles.push({x:e.x,y:e.y-10,vx:(Math.random()-.5)*5,
          vy:-Math.random()*4,life:1,col:'#7bc47f',size:4});
      } else respawn();
    }
  }
  enemies=enemies.filter(e=>e.dead<15);
  // bayrak
  if(flag&&Math.abs(P.x-flag.x)<26&&P.y>flag.y-10&&P.y<flag.y+T*2) endLevel(true);
  // kamera
  const target=P.x-W*0.38;
  camX+=(Math.max(0,Math.min(target,mw*T-W))-camX)*0.1;
  for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=0.03; }
  particles=particles.filter(p=>p.life>0);
}

/* çizim */
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function draw(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#7ec8ff'); g.addColorStop(1,'#cdeeff');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // bulutlar
  ctx.fillStyle='rgba(255,255,255,.8)';
  for(let i=0;i<5;i++){ const cx=((i*260-camX*0.3)%(W+300))-150+((i*97)%60), cy=60+((i*53)%120);
    ctx.beginPath(); ctx.ellipse(cx,cy,46,16,0,0,6.28);
    ctx.ellipse(cx+30,cy-8,30,14,0,0,6.28); ctx.fill(); }
  if(!map){ return; }
  const oy=H-mh*T-(IS_TOUCH?170:0);
  ctx.save(); ctx.translate(-camX,oy<0?0:oy);
  const x0=Math.floor(camX/T), x1=Math.min(mw,x0+Math.ceil(W/T)+2);
  for(let y=0;y<mh;y++)for(let x=x0;x<x1;x++){
    const c=map[y][x], px=x*T, py=y*T;
    if(c==='#'){ ctx.fillStyle='#a5683c'; ctx.fillRect(px,py,T,T);
      if(y===0||!solid(map[y-1]?.[x])){ ctx.fillStyle='#5fc86e'; ctx.fillRect(px,py,T,12);
        ctx.fillStyle='#79dc85'; ctx.fillRect(px,py,T,5); } }
    if(c==='='){ ctx.fillStyle='#c98e55'; rr(px+1,py+4,T-2,14,6); ctx.fill();
      ctx.fillStyle='#e8b07a'; rr(px+2,py+5,T-4,5,3); ctx.fill(); }
    if(c==='B'){ ctx.fillStyle='#d98a3a'; rr(px+2,py+2,T-4,T-4,6); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.3)'; ctx.fillRect(px+5,py+5,T-10,6);
      ctx.fillStyle='#8a5220'; ctx.font='bold 20px system-ui'; ctx.textAlign='center';
      ctx.fillText('?',px+T/2,py+T/2+7); }
  }
  // altınlar
  for(const c of coins){ if(c.got) continue;
    const bob=Math.sin(tick*0.1+c.x)*3;
    ctx.fillStyle='#ffc93c'; ctx.beginPath();
    ctx.ellipse(c.x,c.y+bob,8*Math.abs(Math.sin(tick*0.05+c.x)),10,0,0,6.28); ctx.fill();
    ctx.strokeStyle='#d9a416'; ctx.lineWidth=2; ctx.stroke(); }
  // bayrak
  if(flag){ ctx.strokeStyle='#888'; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(flag.x,flag.y+T); ctx.lineTo(flag.x,flag.y-T*1.6); ctx.stroke();
    ctx.fillStyle='#ff5f7a'; ctx.beginPath();
    ctx.moveTo(flag.x,flag.y-T*1.6); ctx.lineTo(flag.x+34,flag.y-T*1.25); ctx.lineTo(flag.x,flag.y-T*0.9);
    ctx.closePath(); ctx.fill(); }
  // düşmanlar: sümüklüler
  for(const e of enemies){
    const sq=e.dead?0.35:1+Math.sin(tick*0.2)*0.06;
    ctx.fillStyle=e.dead?'#9ad49e':'#7bc47f';
    ctx.beginPath(); ctx.ellipse(e.x,e.y-e.h*sq/2,e.w/2,e.h*sq/2,0,0,6.28); ctx.fill();
    if(!e.dead){
      const d=Math.sign(e.vx)||1;
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(e.x+d*5,e.y-e.h+9,4.5,0,6.28); ctx.arc(e.x+d*13,e.y-e.h+10,4,0,6.28); ctx.fill();
      ctx.fillStyle='#243447';
      ctx.beginPath(); ctx.arc(e.x+d*6.5,e.y-e.h+9,2,0,6.28); ctx.arc(e.x+d*14.5,e.y-e.h+10,1.8,0,6.28); ctx.fill();
    }
  }
  // oyuncu: kasketli kaşif
  ctx.save(); ctx.translate(P.x,P.y);
  const lean=P.ground?Math.max(-0.15,Math.min(0.15,P.vx*0.03)):0;
  ctx.rotate(lean);
  ctx.fillStyle='rgba(36,52,71,.25)';
  ctx.beginPath(); ctx.ellipse(0,2,12,3,0,0,6.28); ctx.fill();
  const bg2=ctx.createLinearGradient(0,-P.h,0,0);
  bg2.addColorStop(0,'#ffb25f'); bg2.addColorStop(1,'#f26419');
  ctx.fillStyle=bg2; rr(-P.w/2,-P.h,P.w,P.h,9); ctx.fill();
  ctx.fillStyle='#3a6ea5'; rr(-P.w/2-2,-P.h,P.w+4,10,5); ctx.fill();   // kasket
  ctx.fillStyle='#3a6ea5'; rr(P.face>0?2:-P.w/2-8,-P.h+2,P.w/2+6,6,3); ctx.fill(); // siperlik
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(P.face*4-2,-P.h+18,3.6,0,6.28); ctx.arc(P.face*4+5,-P.h+18,3.2,0,6.28); ctx.fill();
  ctx.fillStyle='#243447';
  ctx.beginPath(); ctx.arc(P.face*4-1,-P.h+18,1.8,0,6.28); ctx.arc(P.face*4+6,-P.h+18,1.6,0,6.28); ctx.fill();
  if(P.ground&&Math.abs(P.vx)>1){
    ctx.strokeStyle='#b34a12'; ctx.lineWidth=4; ctx.lineCap='round';
    const ph=Math.sin(tick*0.45)*6;
    ctx.beginPath(); ctx.moveTo(-6,-2); ctx.lineTo(-6+ph,4);
    ctx.moveTo(6,-2); ctx.lineTo(6-ph,4); ctx.stroke();
  }
  ctx.restore();
  // parçacıklar
  for(const p of particles){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.col;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size); }
  ctx.globalAlpha=1;
  ctx.restore();
}

/* ── girdi ── */
addEventListener('keydown',e=>{
  if(e.repeat) return;
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.L=true;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.R=true;
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){ keys.J=true; jumpBuf=7; e.preventDefault(); }
  if(e.code==='Escape'||e.code==='KeyP'){ if(state==='play') doPause(); else if(state==='paused') resume(); }
});
addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.L=false;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.R=false;
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') keys.J=false;
});
const dpad=document.getElementById('dpad'), jumpZone=document.getElementById('jumpZone');
const lBtn=document.getElementById('leftBtn'), rBtn=document.getElementById('rightBtn'),
      jBtn=document.getElementById('jumpBtn');
let dirId=null, jumpId=null;
function setDir(x){
  const lr=lBtn.getBoundingClientRect(), rrect=rBtn.getBoundingClientRect();
  const mid=(lr.right+rrect.left)/2;
  keys.L=x<mid; keys.R=x>=mid;
  lBtn.classList.toggle('on',keys.L); rBtn.classList.toggle('on',keys.R);
}
function clearDir(){ keys.L=keys.R=false; lBtn.classList.remove('on'); rBtn.classList.remove('on'); }
dpad.addEventListener('touchstart',e=>{ e.preventDefault();
  const t=e.changedTouches[0]; dirId=t.identifier; setDir(t.clientX); audio(); },{passive:false});
dpad.addEventListener('touchmove',e=>{ e.preventDefault();
  for(const t of e.changedTouches) if(t.identifier===dirId) setDir(t.clientX); },{passive:false});
const dEnd=e=>{ for(const t of e.changedTouches) if(t.identifier===dirId){ dirId=null; clearDir(); } };
dpad.addEventListener('touchend',dEnd); dpad.addEventListener('touchcancel',dEnd);
jumpZone.addEventListener('touchstart',e=>{ e.preventDefault();
  jumpId=e.changedTouches[0].identifier;
  keys.J=true; jumpBuf=7; jBtn.classList.add('on'); audio(); },{passive:false});
const jEnd=e=>{ for(const t of e.changedTouches) if(t.identifier===jumpId){
  jumpId=null; keys.J=false; jBtn.classList.remove('on'); } };
jumpZone.addEventListener('touchend',jEnd); jumpZone.addEventListener('touchcancel',jEnd);

function tap(el,fn){ if(fn)el._fn=fn;
  const fire=e=>{ e.preventDefault(); e.stopPropagation(); if(el._fn)el._fn(); };
  el.addEventListener('click',fire); el.addEventListener('touchend',fire); }

/* ── akış ── */
const pauseBtn=document.getElementById('pauseBtn');
function setPause(v){ pauseBtn.classList.toggle('show',v); }
function doPause(){ if(state!=='play')return; state='paused';
  document.getElementById('pausecard').classList.remove('hidden'); }
function resume(){ state='play'; document.getElementById('pausecard').classList.add('hidden'); }
tap(pauseBtn,doPause);
document.addEventListener('visibilitychange',()=>{ if(document.hidden)doPause(); });
tap(document.getElementById('resumeBtn'),resume);
function showMenu(){
  state='intro'; setPause(false);
  document.getElementById('pausecard').classList.add('hidden');
  document.getElementById('endcard').classList.add('hidden');
  buildLvlRow();
  document.getElementById('intro').classList.remove('hidden');
}
tap(document.getElementById('quitBtn'),showMenu);
tap(document.getElementById('menuBtn'),showMenu);
tap(document.getElementById('nextBtn'),null);

function buildLvlRow(){
  const row=document.getElementById('lvlRow'); row.innerHTML='';
  for(let i=1;i<=LEVELS.length;i++){
    const b=document.createElement('button');
    b.className='lvl'+(i>prog.unlocked?' lock':'');
    b.textContent= i>prog.unlocked?'🔒':i;
    tap(b,()=>{ try{audio();}catch(e){} startLevel(i); });
    row.appendChild(b);
  }
}
function loop(){ if(state==='play') physics(); draw(); requestAnimationFrame(loop); }
buildLvlRow(); loop();
</script>
