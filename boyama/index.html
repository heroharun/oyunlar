<!doctype html>
<html lang="tr">
<meta charset="utf-8">
<title>BOYAMA KİTABI — Rengarenk Dünya</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  :root{ --bg:#fff8f0; --ink:#5a4a3a; --dim:#b8a590; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:"Avenir Next","Futura","Trebuchet MS",system-ui,sans-serif;
    -webkit-user-select:none;user-select:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  #wrap{height:100%;display:flex;flex-direction:column;align-items:center;gap:8px;
    padding:max(10px,env(safe-area-inset-top)) 10px max(10px,env(safe-area-inset-bottom))}
  header{display:flex;align-items:center;gap:10px;width:min(94vw,480px);justify-content:space-between}
  h1{font-size:20px;font-weight:900}
  .pick{display:flex;gap:6px}
  .pickbtn{font:inherit;font-size:22px;background:#fff;border:2px solid #eaddcd;border-radius:12px;
    width:44px;height:44px;cursor:pointer}
  .pickbtn.on{border-color:#ff9f5f;background:#fff2e8}
  #svgbox{flex:1;min-height:0;width:min(94vw,480px);background:#fff;border-radius:20px;
    box-shadow:0 8px 26px rgba(90,74,58,.12);display:flex;align-items:center;justify-content:center;
    padding:10px}
  svg{width:100%;height:100%}
  svg .r{cursor:pointer;stroke:#5a4a3a;stroke-width:3;stroke-linejoin:round;transition:fill .15s}
  #palette{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;width:min(94vw,480px);padding:4px 0}
  .swatch{width:40px;height:40px;border-radius:50%;border:3px solid #fff;cursor:pointer;
    box-shadow:0 2px 6px rgba(90,74,58,.25);transition:transform .1s}
  .swatch.on{transform:scale(1.22);border-color:#5a4a3a}
  #tools{display:flex;gap:8px}
  .tool{font:inherit;font-size:13px;font-weight:800;letter-spacing:.04em;color:var(--ink);
    background:#fff;border:2px solid #eaddcd;border-radius:999px;padding:9px 16px;cursor:pointer}
  .tool:active{background:#fff2e8}
</style>

<div id="wrap">
  <header>
    <h1>🎨 Boyama Kitabı</h1>
    <div class="pick" id="pick"></div>
  </header>
  <div id="svgbox"></div>
  <div id="palette"></div>
  <div id="picName" style="font-size:15px;font-weight:900;letter-spacing:.08em;color:#8a6d4e;text-transform:uppercase"></div>
  <div id="tools">
    <button class="tool" id="newPicBtn" style="background:#ffe8c8;border-color:#e8b45f">🎲 Yeni Resim</button>
    <button class="tool" id="dlBtn" style="background:#e0f0e8;border-color:#7cb356">📥 İndir</button>
    <button class="tool" id="eraseBtn">🧽 Sil</button>
    <button class="tool" id="clearBtn">🗑️ Temizle</button>
  </div>
</div>

/* ── SONSUZ RESİM ÜRETİCİ: 4 şablon × binlerce tohum ── */
function RNG(s){ return ()=>{ s=(s*9301+49297)%233280; return s/233280; }; }

  mandala(r){
    let p=''; const segs=6+Math.floor(r()*6);

    for(let ring=0;ring<3;ring++){
      const r0=rings[ring]+4, r1=rings[ring+1]-2;
      for(let k=0;k<segs;k++){
        const a0=(k/segs)*6.2832-1.5708, a1=((k+0.9)/segs)*6.2832-1.5708;
        const pts=[[a0,r0],[a0,r1],[a1,r1],[a1,r0]]
          .map(([a,rr])=>(150+Math.cos(a)*rr).toFixed(1)+','+(150+Math.sin(a)*rr).toFixed(1));
        p+=`<polygon class="r" id="m${ring}_${k}" points="${pts.join(' ')}"/>`;
      }
    }
    p+=`<circle class="r" id="mc" cx="150" cy="150" r="20"/>`;
    return p;
  },

    if(fins) p+=`<rect class="r" id="rbant" x="115" y="178" width="70" height="12" rx="4"/>`;

  akvaryum(r){
    let p='';

    for(let i=0;i<n;i++){
      const fx=60+r()*170, fy=55+r()*160, fs=0.55+r()*0.7, dir=r()<0.5?1:-1;

  bahce(r){

  apartman(r){
    const kat=3+Math.floor(r()*3), kol=2+Math.floor(r()*2);
    const kh=Math.min(46,190/kat);
    let p=`<rect class="r" id="azemin" x="10" y="262" width="280" height="34"/>
      <rect class="r" id="agovde" x="90" y="${(258-kat*kh).toFixed(0)}" width="120" height="${(kat*kh).toFixed(0)}"/>

const GEN_ICON={mandala:'🌀',roket:'🚀',akvaryum:'🐟',bahce:'🌼',cami:'🕌',ev:'🏠',apartman:'🏢',okul:'🏫',
  gozluk:'👓',inek:'🐄',kalem:'✏️',defter:'📒',semsiye:'☂️',otobus:'🚌',buzdolabi:'🧊',camasir:'🌀',
  seker:'🍬',nalbur:'🔨',yazarkasa:'🧾',kopek:'🐕',zurafa:'🦒',fil:'🐘',aslan:'🦁',ayi:'🐻',at:'🐎'};
const GEN_NAME={mandala:'Mandala',roket:'Roket',akvaryum:'Akvaryum',bahce:'Çiçek Bahçesi',cami:'Cami',
  ev:'Ev',apartman:'Apartman',okul:'Okul',gozluk:'Gözlük',inek:'İnek',kalem:'Kalem',defter:'Defter',
  semsiye:'Şemsiye',otobus:'Otobüs',buzdolabi:'Buzdolabı',camasir:'Çamaşır Makinesi',seker:'Şekerler',
  nalbur:'Nalbur Tezgâhı',yazarkasa:'Yazar Kasa',kopek:'Köpek',zurafa:'Zürafa',fil:'Fil',aslan:'Aslan',ayi:'Ayı',at:'At'};
const CUR_NAME={kedi:'Kedi',kelebek:'Kelebek',araba:'Araba',cicek:'Çiçek',balik:'Balık'};
function makeGen(tpl,seed){
  const id='gen_'+tpl+'_'+seed;
  PICS[id]={icon:GEN_ICON[tpl],vb:'0 0 300 300',parts:GEN[tpl](RNG(seed))};
  return id;
}
function newRandomPic(){
  const keys=Object.keys(GEN);
  const tpl=keys[Math.floor(Math.random()*keys.length)];
  const seed=1+Math.floor(Math.random()*99999);
  try{ localStorage.setItem('boyama_lastgen',JSON.stringify({tpl,seed})); }catch(e){}
  loadPic(makeGen(tpl,seed));
  pop();
}
let curPic='kedi', curColor=PALETTE[0], erase=false;
let saved={};
try{ saved=JSON.parse(localStorage.getItem('boyama_save'))||{}; }catch(e){}
function save(){ try{ localStorage.setItem('boyama_save',JSON.stringify(saved)); }catch(e){} }

const box=document.getElementById('svgbox');
function loadPic(name){
  curPic=name;
  const p=PICS[name];
  box.innerHTML=`<svg viewBox="${p.vb}" xmlns="http://www.w3.org/2000/svg">${p.parts}</svg>`;
  const colors=saved[name]||{};
  for(const el of box.querySelectorAll('.r')){
    const isLine=el.getAttribute('fill')==='none';
    if(!isLine) el.setAttribute('fill',colors[el.id]||'#ffffff');
    el.addEventListener('click',()=>{
      if(el.getAttribute('fill')==='none'&&!erase) return;
      if(erase){ el.setAttribute('fill','#ffffff'); delete (saved[name]=saved[name]||{})[el.id]; }
      else{ el.setAttribute('fill',curColor); (saved[name]=saved[name]||{})[el.id]=curColor; }
      save(); pop();
    });
  }
  for(const b of document.querySelectorAll('.pickbtn'))
    b.classList.toggle('on',b.dataset.p===name);
  /* öğretici isim etiketi */
  const tpl=name.startsWith('gen_')?name.split('_')[1]:null;
  document.getElementById('picName').textContent =
    tpl ? (GEN_NAME[tpl]||'') : (CUR_NAME[name]||'');
  /* kayıt şişmesin: en fazla 40 resmin boyası saklansın */
  const keys=Object.keys(saved);
  if(keys.length>40){ for(const k of keys.slice(0,keys.length-40)) delete saved[k]; save(); }
}
let AC=null;
function pop(){ try{
  if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended')AC.resume();
  const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain();
  o.type='sine'; o.frequency.value=400+Math.random()*400;
  g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  o.connect(g).connect(AC.destination); o.start(t); o.stop(t+0.16);
  navigator.vibrate&&navigator.vibrate(8);
}catch(e){} }

/* resim seçici */
const pick=document.getElementById('pick');
for(const [name,p] of Object.entries(PICS)){
  const b=document.createElement('button');
  b.className='pickbtn'; b.dataset.p=name; b.textContent=p.icon;
  b.addEventListener('click',()=>loadPic(name));
  pick.appendChild(b);
}
/* palet */
const pal=document.getElementById('palette');
PALETTE.forEach((c,i)=>{
  const s=document.createElement('button');
  s.className='swatch'+(i===0?' on':''); s.style.background=c;
  s.addEventListener('click',()=>{
    curColor=c; erase=false;
    document.getElementById('eraseBtn').style.background='';
    for(const x of pal.children) x.classList.remove('on');
    s.classList.add('on');
  });
  pal.appendChild(s);
});
document.getElementById('eraseBtn').addEventListener('click',()=>{
  erase=!erase;
  document.getElementById('eraseBtn').style.background=erase?'#ffe0d0':'';
});
document.getElementById('clearBtn').addEventListener('click',()=>{
  delete saved[curPic]; save(); loadPic(curPic);
});
document.getElementById('newPicBtn').addEventListener('click',newRandomPic);
/* 📥 boyanmış resmi PNG indir */
document.getElementById('dlBtn').addEventListener('click',()=>{
  pop();
  const svgEl=box.querySelector('svg');
  if(!svgEl) return;
  const name=document.getElementById('picName').textContent||'boyama';
  const data='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="700" height="700">'
    +svgEl.innerHTML+'</svg>';
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas'); c.width=700; c.height=760;
    const x=c.getContext('2d');
    x.fillStyle='#ffffff'; x.fillRect(0,0,700,760);
    x.drawImage(img,0,0);
    x.fillStyle='#8a6d4e'; x.font='700 30px Avenir Next, sans-serif'; x.textAlign='center';
    x.fillText(name+' 🎨',350,738);
    const a=document.createElement('a');
    a.download='boyama-'+name.toLocaleLowerCase('tr').replace(/\s+/g,'-')+'.png';
    a.href=c.toDataURL('image/png');
    a.click();
  };
  img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(data);
});
/* son rastgele resmi hatırla */
let opened=false;
try{ const lg=JSON.parse(localStorage.getItem('boyama_lastgen'));
  if(lg&&GEN[lg.tpl]){ loadPic(makeGen(lg.tpl,lg.seed)); opened=true; } }catch(e){}
if(!opened) loadPic('kedi');
