<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Hâl — Müminin farkındalık ve yaşam defteri</title>
<!--
  HÂL — Müminin farkındalık ve yaşam defteri
  ─────────────────────────────────────────────
  • Tek dosyalık, çevrimdışı çalışan prototip (vanilla JS, harici kütüphane yok)
  • Tüm veriler yalnızca bu cihazda, localStorage içinde saklanır
  • PIN kilidi PROTOTİP düzeyindedir: veriler şifrelenmez, yalnızca arayüz kilidi sağlar.
    Gerçek güvenlik için ileride şifreleme (ör. WebCrypto) eklenmelidir.
  • Bildirimler yalnızca sekme AÇIKKEN güvenilir çalışır (Notification API sınırı).
    Arka plan bildirimi için PWA + service worker + push gerekir (dosya sonunda not var).
  Bölümler (Ctrl+F ile arayın):
    [CSS]  tasarım sistemi
    [DATA] günlük içerik veri setleri (ayet / hadis / söz / kelime)
    [CORE] durum, localStorage, yardımcılar
    [ONBD] karşılama & kurulum
    [TAB1] Bugün   [TAB2] İbadet   [TAB3] Günlük   [TAB4] Keşfet   [TAB5] Profil
    [NOTF] bildirim sistemi   [CAL] takvim & arşiv   [SUM] özetler
-->
<style>
/* ══════════ [CSS] TASARIM SİSTEMİ ══════════ */
:root{
  /* Işık tema — krem, kırık beyaz, toprak, soluk zeytin, gece laciverti, yumuşak altın */
  --bg:#F5F0E6; --bg2:#EFE8D9; --card:#FFFDF7; --card2:#FAF5EA;
  --ink:#28304A; --ink2:#4A5068; --muted:#8B8574; --line:#E4DBC6;
  --olive:#7E8A62; --olive-soft:#EBEDE0; --earth:#A9835F; --earth-soft:#F1E6D8;
  --navy:#28304A; --gold:#B99552; --gold-soft:#F3EAD5;
  --ok:#7E8A62; --warn:#B07A4A; --danger:#A05252;
  --r:18px; --r-sm:12px;
  --shadow:0 2px 10px rgba(40,48,74,.06);
  --font-body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --font-disp:"Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;
  --fs:16px;
}
[data-theme="dark"]{
  --bg:#1B2132; --bg2:#161B2A; --card:#242B40; --card2:#2A3148;
  --ink:#EAE3D2; --ink2:#C9C2B0; --muted:#8E93A6; --line:#343C55;
  --olive:#9AA67E; --olive-soft:#2C3340; --earth:#C09A72; --earth-soft:#33313E;
  --navy:#EAE3D2; --gold:#CBA765; --gold-soft:#33344A;
  --ok:#9AA67E; --warn:#C09A72; --danger:#C77;
  --shadow:0 2px 12px rgba(0,0,0,.28);
}
[data-elder="1"]{ --fs:19px; }
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
html{font-size:var(--fs);}
body{font-family:var(--font-body); background:var(--bg); color:var(--ink); line-height:1.55; min-height:100vh; transition:background .3s,color .3s;}
h1,h2,h3,.disp{font-family:var(--font-disp); font-weight:600; letter-spacing:.2px;}
button{font-family:inherit; font-size:inherit; cursor:pointer; border:none; background:none; color:inherit;}
input,select,textarea{font-family:inherit; font-size:1rem; color:var(--ink); background:var(--card2); border:1px solid var(--line); border-radius:var(--r-sm); padding:.6em .8em; width:100%;}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--gold); outline-offset:1px;}
textarea{resize:vertical; min-height:2.6em;}
@media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important;}}

/* Yerleşim */
#app{max-width:640px; margin:0 auto; padding:0 16px calc(84px + env(safe-area-inset-bottom)); }
header.top{padding:20px 2px 8px; display:flex; align-items:flex-end; justify-content:space-between; gap:10px;}
header.top .brand{font-family:var(--font-disp); font-size:1.05rem; color:var(--muted); letter-spacing:.5px;}
header.top .brand b{color:var(--gold); font-weight:700;}
.tagline{font-size:.78rem; color:var(--muted); font-style:italic;}
main{display:block;}
.page-title{font-size:1.45rem; margin:10px 0 4px;}
.page-sub{color:var(--muted); font-size:.88rem; margin-bottom:14px;}

/* İmza öğe: gün başlığındaki ince altın "hilal çizgisi" */
.hilal{height:3px; width:64px; border-radius:3px; margin:10px 0 16px;
  background:linear-gradient(90deg,var(--gold),transparent); position:relative;}
.hilal::before{content:""; position:absolute; left:-2px; top:-3.5px; width:10px; height:10px;
  border-radius:50%; border:2px solid var(--gold); border-left-color:transparent; border-bottom-color:transparent; transform:rotate(-45deg);}

/* Kartlar */
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow); padding:16px; margin-bottom:14px;}
.card h3{font-size:1.02rem; margin-bottom:10px; display:flex; align-items:center; gap:8px;}
.card h3 .em{font-size:1.1em;}
.hint{font-size:.78rem; color:var(--muted);}
.row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
.grow{flex:1;}
.stack>*+*{margin-top:8px;}

/* Butonlar */
.btn{display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:.55em 1em; border-radius:var(--r-sm); border:1px solid var(--line);
  background:var(--card2); color:var(--ink); font-weight:500; transition:transform .08s;}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--navy); color:var(--bg); border-color:var(--navy);}
[data-theme="dark"] .btn.primary{background:var(--gold); color:#1B2132; border-color:var(--gold);}
.btn.gold{background:var(--gold-soft); border-color:var(--gold); color:var(--ink);}
.btn.danger{background:transparent; border-color:var(--danger); color:var(--danger);}
.btn.small{padding:.3em .7em; font-size:.85rem;}
.btn.ghost{background:transparent;}
.btn.round{border-radius:50%; width:2.4em; height:2.4em; padding:0; font-size:1.05rem;}
.btn[disabled]{opacity:.45; cursor:not-allowed;}

/* Çip / seçim grupları */
.chips{display:flex; flex-wrap:wrap; gap:8px;}
.chip{padding:.45em .85em; border-radius:999px; border:1px solid var(--line); background:var(--card2); font-size:.88rem;}
.chip.on{background:var(--olive-soft); border-color:var(--olive); color:var(--ink); font-weight:600;}
.chip.gold.on{background:var(--gold-soft); border-color:var(--gold);}

/* Ruh hâli */
.moods{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
.mood{display:flex; flex-direction:column; align-items:center; gap:4px; padding:10px 4px; border-radius:var(--r-sm); border:1px solid var(--line); background:var(--card2); font-size:.72rem; color:var(--ink2);}
.mood .em{font-size:1.5rem;}
.mood.on{border-color:var(--gold); background:var(--gold-soft); font-weight:600; color:var(--ink);}

/* Su sayacı */
.water-cups{display:flex; flex-wrap:wrap; gap:5px; margin:8px 0;}
.cup{font-size:1.3rem; filter:grayscale(1) opacity(.35);}
.cup.full{filter:none;}
.progress{height:8px; background:var(--bg2); border-radius:6px; overflow:hidden; margin-top:6px;}
.progress>i{display:block; height:100%; background:linear-gradient(90deg,var(--olive),var(--gold)); border-radius:6px; transition:width .3s;}

/* Namaz satırları */
.vakit{border-top:1px dashed var(--line); padding:10px 0;}
.vakit:first-of-type{border-top:none;}
.vakit .name{font-weight:600; min-width:4.2em;}
.vakit select{width:auto; flex:1; min-width:0; font-size:.9rem; padding:.4em .5em;}
.st-tag{font-size:.72rem; padding:.15em .55em; border-radius:999px; background:var(--bg2);}
.st-vaktinde{background:var(--olive-soft); color:var(--olive);}
.st-muaf{background:var(--gold-soft); color:var(--gold);}

/* Günlük kartları */
.j-card{position:relative;}
.j-card .j-date{font-size:.75rem; color:var(--muted);}
.j-card img{max-width:100%; border-radius:var(--r-sm); margin-top:8px;}
.tags{display:flex; flex-wrap:wrap; gap:5px; margin-top:6px;}
.tag{font-size:.72rem; background:var(--olive-soft); color:var(--ink2); padding:.15em .6em; border-radius:999px;}
.j-locked{filter:blur(0); text-align:center; padding:22px 10px; color:var(--muted);}

/* Keşfet */
.k-card{border-left:4px solid var(--gold);}
.k-card.ayet{border-left-color:var(--olive);}
.k-card.hadis{border-left-color:var(--earth);}
.k-card.soz{border-left-color:var(--gold);}
.k-card.kelime{border-left-color:var(--navy);}
[data-theme="dark"] .k-card.kelime{border-left-color:var(--gold);}
.k-text{font-family:var(--font-disp); font-size:1.06rem; line-height:1.65; margin-bottom:8px;}
.k-src{font-size:.78rem; color:var(--muted);}
.k-type{display:inline-block; font-size:.7rem; letter-spacing:.6px; text-transform:uppercase; color:var(--gold); margin-bottom:6px; font-weight:700;}

/* Takvim */
.cal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center;}
.cal-grid .dow{font-size:.7rem; color:var(--muted); padding:4px 0;}
.cal-day{padding:8px 0; border-radius:10px; font-size:.85rem; position:relative; background:var(--card2); border:1px solid transparent;}
.cal-day.other{opacity:.3;}
.cal-day.today{border-color:var(--gold); font-weight:700;}
.cal-day.has::after{content:""; position:absolute; bottom:4px; left:50%; transform:translateX(-50%); width:5px; height:5px; border-radius:50%; background:var(--olive);}
.cal-day.regl{background:var(--earth-soft);}

/* Alt menü */
nav.bottom{position:fixed; bottom:0; left:0; right:0; z-index:50;
  background:var(--card); border-top:1px solid var(--line);
  display:flex; justify-content:space-around; padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
nav.bottom button{display:flex; flex-direction:column; align-items:center; gap:2px; font-size:.68rem; color:var(--muted); padding:4px 10px; border-radius:12px; min-width:56px;}
nav.bottom button .em{font-size:1.35rem; line-height:1;}
nav.bottom button.on{color:var(--ink); font-weight:700; background:var(--gold-soft);}

/* Modal & kilit */
.overlay{position:fixed; inset:0; background:rgba(20,24,38,.55); z-index:90; display:flex; align-items:flex-end; justify-content:center;}
.overlay .sheet{background:var(--card); width:100%; max-width:640px; max-height:88vh; overflow:auto; border-radius:22px 22px 0 0; padding:20px 18px calc(20px + env(safe-area-inset-bottom));}
@media(min-width:700px){ .overlay{align-items:center;} .overlay .sheet{border-radius:22px; max-height:84vh;} }
#lockScreen{position:fixed; inset:0; z-index:200; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:24px; text-align:center;}
.pin-dots{display:flex; gap:12px;}
.pin-dots i{width:14px; height:14px; border-radius:50%; border:2px solid var(--gold); display:block;}
.pin-dots i.f{background:var(--gold);}
.pin-pad{display:grid; grid-template-columns:repeat(3,72px); gap:12px;}
.pin-pad button{height:60px; border-radius:16px; background:var(--card); border:1px solid var(--line); font-size:1.3rem; font-family:var(--font-disp);}

/* Onboarding */
#onboard{position:fixed; inset:0; z-index:150; background:var(--bg); overflow:auto; padding:28px 20px 40px;}
#onboard .inner{max-width:520px; margin:0 auto;}
#onboard h1{font-size:2rem; color:var(--ink);}
#onboard .big-tag{font-family:var(--font-disp); font-style:italic; color:var(--gold); margin:6px 0 22px;}

/* Toast */
#toast{position:fixed; left:50%; bottom:96px; transform:translateX(-50%) translateY(20px); background:var(--navy); color:var(--bg); padding:.6em 1.2em; border-radius:999px; font-size:.88rem; opacity:0; pointer-events:none; transition:all .25s; z-index:300; max-width:88vw; text-align:center;}
[data-theme="dark"] #toast{background:var(--gold); color:#1B2132;}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* Çocuk modu */
[data-child="1"] .card{border-radius:24px;}
[data-child="1"]{--gold:#D9A441; --olive:#7FA65A;}
.garden{display:flex; flex-wrap:wrap; gap:6px; font-size:1.7rem; min-height:2.2em; padding:10px; background:var(--olive-soft); border-radius:var(--r-sm);}
.child-q{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px; border-radius:16px; background:var(--card2); border:1px solid var(--line); margin-bottom:8px;}
.child-q .q{font-size:.95rem;}

.small-note{font-size:.74rem; color:var(--muted); border-top:1px dashed var(--line); margin-top:10px; padding-top:8px;}
.divider{border:none; border-top:1px dashed var(--line); margin:12px 0;}
.center{text-align:center;}
.hidden{display:none!important;}
.fav-btn{font-size:1.1rem; opacity:.5;}
.fav-btn.on{opacity:1;}
.kaza-grid{display:grid; grid-template-columns:1fr auto auto auto; gap:8px 6px; align-items:center;}
.kaza-grid .num{font-weight:700; font-family:var(--font-disp); min-width:2.5em; text-align:center;}
.summary-line{display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px dashed var(--line); font-size:.92rem;}
.summary-line:last-child{border-bottom:none;}
.summary-line b{font-family:var(--font-disp);}
.view-toggle{display:flex; gap:6px; margin-bottom:12px;}
</style>
</head>
<body>

<!-- PIN kilit ekranı -->
<div id="lockScreen" class="hidden">
  <div class="disp" style="font-size:1.8rem;color:var(--gold)">Hâl</div>
  <p class="hint">Devam etmek için PIN girin</p>
  <div class="pin-dots" id="pinDots"><i></i><i></i><i></i><i></i></div>
  <div class="pin-pad" id="pinPad"></div>
  <p class="hint" id="pinMsg"></p>
</div>

<!-- Karşılama & kurulum -->
<div id="onboard" class="hidden"></div>

<div id="app" class="hidden">
  <header class="top">
    <div>
      <div class="brand"><b>Hâl</b> · farkındalık defteri</div>
      <div class="tagline">“Kendini yargılamak için değil, hâlini fark etmek için.”</div>
    </div>
    <button class="btn round ghost" id="themeBtn" title="Tema değiştir">🌙</button>
  </header>
  <main id="view"></main>
</div>

<nav class="bottom hidden" id="nav">
  <button data-tab="bugun"><span class="em">🌤️</span>Bugün</button>
  <button data-tab="ibadet"><span class="em">🕌</span>İbadet</button>
  <button data-tab="gunluk"><span class="em">📖</span>Günlük</button>
  <button data-tab="kesfet"><span class="em">✨</span>Keşfet</button>
  <button data-tab="profil"><span class="em">🌿</span>Profil</button>
</nav>

<div id="modalRoot"></div>
<div id="toast"></div>

<script>
/* ══════════ [DATA] GÜNLÜK İÇERİKLER ══════════
   Ayet mealleri kısa ve özet niteliğindedir; sure adı ve ayet numarası verilmiştir.
   Hadisler yaygın olarak bilinen sahih kaynaklardan derlenmiştir.
   Sözlerde tür etiketi açıkça belirtilir; kaynağı belirsiz söz hadis olarak sunulmaz. */
const AYETLER=[
{m:"Allah hiç kimseye gücünün yeteceğinden fazlasını yüklemez.",s:"Bakara",n:"2/286"},
{m:"Şüphesiz her zorlukla beraber bir kolaylık vardır.",s:"İnşirâh",n:"94/5-6"},
{m:"Bilin ki kalpler ancak Allah'ı anmakla huzura kavuşur.",s:"Ra'd",n:"13/28"},
{m:"Beni anın ki ben de sizi anayım; bana şükredin, nankörlük etmeyin.",s:"Bakara",n:"2/152"},
{m:"Allah'ın rahmetinden ümidinizi kesmeyin; şüphesiz O çok bağışlayandır.",s:"Zümer",n:"39/53"},
{m:"Kim Allah'a güvenip dayanırsa O, ona yeter.",s:"Talâk",n:"65/3"},
{m:"Sabır ve namazla yardım isteyin; şüphesiz Allah sabredenlerle beraberdir.",s:"Bakara",n:"2/153"},
{m:"Şükrederseniz elbette size olan nimetimi artırırım.",s:"İbrahim",n:"14/7"},
{m:"Rabbin sana verecek ve sen hoşnut olacaksın.",s:"Duhâ",n:"93/5"},
{m:"Bizim uğrumuzda çaba gösterenleri elbette yollarımıza eriştiririz.",s:"Ankebût",n:"29/69"},
{m:"Kullarım sana beni sorarsa: Ben çok yakınım; dua edenin duasına karşılık veririm.",s:"Bakara",n:"2/186"},
{m:"Bir işe azmettiğinde Allah'a dayan; Allah kendisine güvenenleri sever.",s:"Âl-i İmrân",n:"3/159"},
{m:"Allah katında en değerliniz, O'na karşı gelmekten en çok sakınanınızdır.",s:"Hucurât",n:"49/13"},

{m:"Seni ancak âlemlere rahmet olarak gönderdik.",s:"Enbiyâ",n:"21/107"},
{m:"Şüphesiz Allah adaleti, iyiliği ve yakınlara yardım etmeyi emreder.",s:"Nahl",n:"16/90"},
{m:"Hanginizin daha güzel iş yapacağını denemek için ölümü ve hayatı yaratan O'dur.",s:"Mülk",n:"67/2"},
{m:"Nerede olursanız olun O sizinle beraberdir.",s:"Hadîd",n:"57/4"},
{m:"Biz ona şah damarından daha yakınız.",s:"Kāf",n:"50/16"},
{m:"Allah koruyucuların en hayırlısıdır; O, merhametlilerin en merhametlisidir.",s:"Yûsuf",n:"12/64"},
{m:"Kim Allah'a iman ederse Allah onun kalbini doğruya yöneltir.",s:"Tegābün",n:"64/11"},

{m:"Size bir selam verildiğinde ondan daha güzeliyle karşılık verin.",s:"Nisâ",n:"4/86"}];

const HADISLER=[
{m:"Ameller niyetlere göredir.",k:"Buhârî, Bed'ü'l-Vahy 1"},
{m:"Müslüman, elinden ve dilinden diğer insanların güvende olduğu kimsedir.",k:"Buhârî, Îmân 4"},

{m:"Kardeşine tebessüm etmen senin için bir sadakadır.",k:"Tirmizî, Birr 36"},
{m:"Temizlik imanın yarısıdır.",k:"Müslim, Tahâret 1"},

{m:"Kim Allah'a ve âhiret gününe inanıyorsa ya hayır söylesin ya sussun.",k:"Buhârî, Edeb 31"},
{m:"Gerçek pehlivan, öfkelendiği anda kendine hâkim olabilendir.",k:"Buhârî, Edeb 76"},
{m:"Din kolaylıktır.",k:"Buhârî, Îmân 29"},
{m:"Hiçbir baba çocuğuna güzel terbiyeden daha değerli bir bağışta bulunmamıştır.",k:"Tirmizî, Birr 33"},
{m:"İki nimet vardır ki insanların çoğu bunları değerlendirmede aldanmıştır: sağlık ve boş zaman.",k:"Buhârî, Rikāk 1"},
{m:"Sizin en hayırlınız Kur'an'ı öğrenen ve öğretendir.",k:"Buhârî, Fedâilü'l-Kur'ân 21"},
{m:"Allah'a ve âhiret gününe iman eden komşusuna ikram etsin.",k:"Buhârî, Edeb 31"},
{m:"Veren el, alan elden üstündür.",k:"Buhârî, Zekât 18"},
{m:"Sadaka malı eksiltmez.",k:"Müslim, Birr 69"},
{m:"Birbirinize haset etmeyin, sırt çevirmeyin; ey Allah'ın kulları, kardeş olun.",k:"Müslim, Birr 23"},
{m:"İnsanlara teşekkür etmeyen, Allah'a şükretmez.",k:"Tirmizî, Birr 35"},

function load(){
  try{ const raw=localStorage.getItem(LS_KEY); if(raw) return JSON.parse(raw); }
  catch(e){ console.warn("Veri okunamadı:",e); }
  return {profile:null, days:{}, kaza:{sabah:0,ogle:0,ikindi:0,aksam:0,yatsi:0,vitir:0}, kazaLog:[],
          journal:[], future:[], custom:[], customTags:[], favs:{ayet:[],hadis:[],soz:[],kelime:[]},
          women:{logs:{}}, thoughts:{}};
}
function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }
  catch(e){ toast("⚠️ Depolama alanı doldu. Eski fotoğrafları silmeyi veya verileri dışa aktarmayı deneyin."); }
}
function todayKey(d=new Date()){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function dayIndex(d=new Date()){ return Math.floor(d.getTime()/86400000); }
function getDay(key=todayKey()){
  if(!S.days[key]) S.days[key]={mood:"",sukur:["","",""],sabir:["","",""],iyilik:"",mutlu:"",kendim:"",yarin:"",
    water:0,waterGoal:8,sleep:{yat:"",uyan:"",kalite:""},prayers:{},ibadet:{},trk:{},child:{},childNote:""};
  return S.days[key];
}
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtDate(key){ const [y,m,d]=key.split("-").map(Number);
  return new Date(y,m-1,d).toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric",weekday:"long"}); }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2600); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function isChild(){ return S.profile && S.profile.age==="cocuk"; }
function modName(){ return S.profile?.name || "dost"; }

/* ══════════ PIN KİLİDİ (prototip düzeyinde) ══════════ */
function showLock(cb,msg="Devam etmek için PIN girin"){
  pinBuf=""; pinCb=cb;
  const ls=document.getElementById("lockScreen"); ls.classList.remove("hidden");
  ls.querySelector(".hint").textContent=msg; document.getElementById("pinMsg").textContent="";
  renderPinDots();
  const pad=document.getElementById("pinPad");
  pad.innerHTML=[1,2,3,4,5,6,7,8,9,"←",0,"✓"].map(n=>`<button data-k="${n}">${n}</button>`).join("");
  pad.querySelectorAll("button").forEach(b=>b.onclick=()=>pinKey(b.dataset.k));
}
function renderPinDots(){ document.getElementById("pinDots").innerHTML=
  [0,1,2,3].map(i=>`<i class="${i<pinBuf.length?'f':''}"></i>`).join(""); }
function pinKey(k){
  if(k==="←"){ pinBuf=pinBuf.slice(0,-1); }
  else if(k==="✓"){ tryPin(); return; }
  else if(pinBuf.length<4){ pinBuf+=k; if(pinBuf.length===4){ renderPinDots(); return tryPin(); } }
  renderPinDots();
}
function tryPin(){
  if(pinBuf===S.profile.pin){ document.getElementById("lockScreen").classList.add("hidden");
    const cb=pinCb; pinCb=null; if(cb)cb(); }
  else{ document.getElementById("pinMsg").textContent="PIN eşleşmedi, tekrar dene."; pinBuf=""; renderPinDots(); }
}

function switchTab(t){ currentTab=t;

  const R={bugun:renderBugun,ibadet:renderIbadet,gunluk:renderGunluk,kesfet:renderKesfet,profil:renderProfil};
  document.getElementById("view").innerHTML=R[t]();
  afterRender(t); window.scrollTo({top:0});
}
function afterRender(t){ if(t==="bugun"&&!isChild()) bindTodayInputs(); if(t==="profil") renderCalendar(); }

function bindTodayInputs(){
  document.querySelectorAll(".tf").forEach(el=>{
    el.addEventListener("change",()=>{ const d=getDay(), f=el.dataset.f;
      if(el.dataset.i!==undefined) d[f][+el.dataset.i]=el.value; else d[f]=el.value;
      save(); });
  });
  document.querySelectorAll(".trkf").forEach(el=>{
    el.addEventListener("change",()=>{ getDay().trk[el.dataset.k]=el.value; save(); });
  });
  document.querySelectorAll(".slf").forEach(el=>{
    el.addEventListener("change",()=>{ getDay().sleep[el.dataset.k]=el.value; save(); switchTab("bugun"); });
  });
}
function setMood(k){ const d=getDay(); d.mood=(d.mood===k?"":k); save(); switchTab("bugun"); }

function waterCard(d){
  const pct=Math.min(100,Math.round(d.water/d.waterGoal*100));
  return `<div class="card"><h3><span class="em">💧</span>Su</h3>
   <div class="row">
     <button class="btn round" onclick="water(-1)">−</button>
     <div class="grow center"><b class="disp" style="font-size:1.3rem">${d.water}</b> / ${d.waterGoal} bardak</div>
     <button class="btn round gold" onclick="water(1)">＋</button>
   </div>
   <div class="water-cups">${Array.from({length:d.waterGoal},(_,i)=>`<span class="cup ${i<d.water?'full':''}">🥛</span>`).join("")}</div>
   <div class="progress"><i style="width:${pct}%"></i></div>
   <div class="row" style="margin-top:8px"><span class="hint grow">Günlük hedef</span>
     <button class="btn small" onclick="waterGoal(-1)">−</button><span>${d.waterGoal}</span>
     <button class="btn small" onclick="waterGoal(1)">＋</button></div></div>`;
}
function water(n){ const d=getDay(); d.water=Math.max(0,d.water+n); save(); switchTab("bugun");
  if(d.water===d.waterGoal) toast("Su hedefin tamam, afiyet olsun 💧"); }
function waterGoal(n){ const d=getDay(); d.waterGoal=Math.min(20,Math.max(1,d.waterGoal+n)); save(); switchTab("bugun"); }

function sleepDur(s){ if(!s.yat||!s.uyan) return null;
  const [h1,m1]=s.yat.split(":").map(Number),[h2,m2]=s.uyan.split(":").map(Number);
  let mins=(h2*60+m2)-(h1*60+m1); if(mins<=0)mins+=1440; return mins; }
function sleepCard(d){
  const dur=sleepDur(d.sleep);
  return `<div class="card"><h3><span class="em">😴</span>Uyku</h3>
   <div class="row">
     <label class="grow hint">Yatış<input type="time" class="slf" data-k="yat" value="${d.sleep.yat}"></label>
     <label class="grow hint">Uyanış<input type="time" class="slf" data-k="uyan" value="${d.sleep.uyan}"></label>
   </div>
   ${dur!=null?`<p style="margin-top:8px">Toplam: <b class="disp">${Math.floor(dur/60)} sa ${dur%60} dk</b></p>`:""}
   <div style="margin-top:8px"><span class="hint">Uyku kalitesi</span>
    <div class="chips" style="margin-top:6px">${["Çok iyi","İyi","Orta","Kötü","Çok kötü"].map(q=>`
      <button class="chip ${d.sleep.kalite===q?'on':''}" onclick="setSleepQ('${q}')">${q}</button>`).join("")}</div></div></div>`;
}
function setSleepQ(q){ const d=getDay(); d.sleep.kalite=(d.sleep.kalite===q?"":q); save(); switchTab("bugun"); }

function trackersCard(d){

function openKazaEstimate(){
  openModal(`<h3 style="margin-bottom:10px">Tarihe göre tahmini hesap</h3>
   <div class="stack">
    <label class="hint">Namaz yükümlülüğünün başladığını düşündüğün tarih<input type="date" id="keStart"></label>
    <label class="hint">Düzenli namaza başladığın tarih<input type="date" id="keReg"></label>
    <label class="hint">O dönemde yaklaşık kıldığın gün oranı (%)<input type="number" id="keRate" min="0" max="100" value="0"></label>
    ${S.profile.women?`<label class="hint">Aylık ortalama muafiyet günü (kadın kullanıcılar)<input type="number" id="keMuaf" min="0" max="15" value="6"></label>`:""}
    <button class="btn primary" onclick="calcKazaEstimate()">Hesapla</button>
    <p class="small-note">Bu hesaplama yaklaşık bir kişisel takip aracıdır. Dinî hüküm veya kesin fetva niteliğinde değildir.</p>
   </div><div id="keResult"></div>`);
}
function calcKazaEstimate(){
  const s=document.getElementById("keStart").value, r=document.getElementById("keReg").value;
  if(!s||!r) return toast("Her iki tarihi de seçmelisin");
  let days=Math.round((new Date(r)-new Date(s))/86400000);
  if(days<=0) return toast("Düzenli başlangıç tarihi, yükümlülük tarihinden sonra olmalı");
  const rate=(parseInt(document.getElementById("keRate").value)||0)/100;
  const muafEl=document.getElementById("keMuaf");
  if(muafEl){ const m=parseInt(muafEl.value)||0; days=Math.round(days*(1-m/30)); }
  const missed=Math.max(0,Math.round(days*(1-rate)));
  document.getElementById("keResult").innerHTML=`
   <hr class="divider"><p>Tahminî eksik gün: <b class="disp">${missed}</b><br>
   <span class="hint">Her vakit için ≈ ${missed} kaza (vitir dâhil ${missed} vitir).</span></p>
   <button class="btn gold" style="width:100%;margin-top:10px" onclick="applyKazaEstimate(${missed})">Sayaçlara işle</button>
   <p class="small-note">Bu hesaplama yaklaşık bir kişisel takip aracıdır. Dinî hüküm veya kesin fetva niteliğinde değildir.</p>`;
}
function applyKazaEstimate(n){ confirmBox("Tahminî değerler mevcut sayaçların üzerine yazılsın mı?",()=>{
  KAZA_VAKIT.forEach(([k])=>S.kaza[k]=n); S.kazaLog=[]; save(); closeModal(); switchTab("ibadet"); toast("Tahmin sayaçlara işlendi"); }); }

  b.onclick=()=>b.classList.toggle("on"); box.appendChild(b);
  document.getElementById("jNewTag").value=""; }
function jPhotoPick(input){
  const file=input.files[0]; if(!file)return;
  const img=new Image(), reader=new FileReader();
  reader.onload=e=>{ img.onload=()=>{
    const MAX=800, sc=Math.min(1,MAX/Math.max(img.width,img.height));
    const cv=document.createElement("canvas"); cv.width=img.width*sc; cv.height=img.height*sc;
    cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
    window._jPhoto=cv.toDataURL("image/jpeg",.72);
    document.getElementById("jPhotoPrev").innerHTML=`<img src="${window._jPhoto}" style="max-width:100%;border-radius:12px">
      <button class="btn small danger" onclick="jPhotoClear()">Fotoğrafı kaldır</button>`; };
    img.src=e.target.result; };
  reader.readAsDataURL(file);
}

   title:document.getElementById("jTitle").value.trim(),
   emoji:document.getElementById("jEmoji").value.trim(),
   text:document.getElementById("jText").value, mood, tags, photo:window._jPhoto||"",
   locked:document.getElementById("jLock").checked,
   fav:id?(S.journal.find(x=>x.id===id)?.fav||false):false };
  if(id) S.journal=S.journal.map(x=>x.id===id?obj:x); else S.journal.push(obj);
  save(); closeModal(); switchTab("gunluk"); toast("Kaydedildi 📖");
  checkWellbeing();

function openFutureEditor(){
  const min=todayKey(new Date(Date.now()+86400000));
  openModal(`<h3 style="margin-bottom:10px">Gelecekteki bana not</h3><div class="stack">
   <input id="fTitle" placeholder="Başlık">
   <textarea id="fMsg" rows="5" placeholder="Sevgili gelecekteki ben…"></textarea>

   <label class="btn small" style="text-align:center">📷 Fotoğraf ekle

function fPhotoPick(input){ const file=input.files[0]; if(!file)return;
  const img=new Image(), reader=new FileReader();
  reader.onload=e=>{ img.onload=()=>{ const MAX=700, sc=Math.min(1,MAX/Math.max(img.width,img.height));
    const cv=document.createElement("canvas"); cv.width=img.width*sc; cv.height=img.height*sc;
    cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
    window._fPhoto=cv.toDataURL("image/jpeg",.7);
    document.getElementById("fPhotoPrev").innerHTML=`<img src="${window._fPhoto}" style="max-width:100%;border-radius:12px">`; };
    img.src=e.target.result; }; reader.readAsDataURL(file); }
function saveFuture(){
  const title=document.getElementById("fTitle").value.trim()||"Not";
  const msg=document.getElementById("fMsg").value.trim();
  const date=document.getElementById("fDate").value;
  if(!msg||!date) return toast("Mesaj ve tarih gerekli");
  if(date<=todayKey()) return toast("Açılma tarihi yarından itibaren olmalı");
  S.future.push({id:uid(),title,msg,openDate:date,created:todayKey(),
    mood:document.querySelector("#fMoods .chip.on")?.dataset.m||"", photo:window._fPhoto||"", opened:false});
  save(); openFutureList(); toast("Notun geleceğe bırakıldı 💌"); }

function futureMarkOpened(id){ const f=S.future.find(x=>x.id===id); if(f){ f.opened=true; save(); openFutureList(); } }
function futureDel(id){ confirmBox("Bu not silinsin mi?",()=>{ S.future=S.future.filter(x=>x.id!==id); save(); openFutureList(); },"Sil",true); }

/* ══════════ [SUM] ÖZETLER ══════════ */
function lastKeys(n){ const out=[]; for(let i=0;i<n;i++) out.push(todayKey(new Date(Date.now()-i*86400000))); return out; }
function summaryHTML(n){
  const keys=lastKeys(n), days=keys.map(k=>S.days[k]).filter(Boolean);
  if(!days.length) return '<p class="hint">Bu aralıkta henüz kayıt yok. Zamanla burada nazik bir özet oluşacak. 🌱</p>';
  const moodCount={}; days.forEach(d=>{ if(d.mood) moodCount[d.mood]=(moodCount[d.mood]||0)+1; });
  const topMood=Object.entries(moodCount).sort((a,b)=>b[1]-a[1])[0];
  const moodInfo=topMood?MOODS.find(m=>m[0]===topMood[0]):null;
  const sukur=days.reduce((a,d)=>a+d.sukur.filter(x=>x.trim()).length,0);
  const iyilik=days.reduce((a,d)=>a+(d.iyilik.trim()?1:0)+Object.values(d.child||{}).filter(v=>v===true).length,0);
  const suOk=days.filter(d=>d.water>=d.waterGoal).length;
  const durs=days.map(d=>sleepDur(d.sleep)).filter(x=>x!=null);
  const avgSleep=durs.length?Math.round(durs.reduce((a,b)=>a+b,0)/durs.length):null;
  const jDays=new Set(S.journal.filter(j=>keys.includes(j.date)).map(j=>j.date)).size;
  let kilindi=0,kaza=0,muaf=0;
  days.forEach(d=>Object.values(d.prayers).forEach(p=>{ if(p.st==="vaktinde"||p.st==="sonradan")kilindi++;
    if(p.st==="kaza")kaza++; if(p.st==="muaf")muaf++; }));
  const kazaKilinan=S.kazaLog.filter(l=>l.kildi).length;
  const tagCount={}; S.journal.filter(j=>keys.includes(j.date)).forEach(j=>(j.tags||[]).forEach(t=>tagCount[t]=(tagCount[t]||0)+1));
  const topTag=Object.entries(tagCount).sort((a,b)=>b[1]-a[1])[0];
  const line=(l,v)=>`<div class="summary-line"><span>${l}</span><b>${v}</b></div>`;
  let gentle="";
  if(durs.length>=3 && (Math.max(...durs)-Math.min(...durs))>150)
    gentle=`<p class="hint" style="margin-top:8px">Uyku düzenin biraz dalgalı görünüyor. Önümüzdeki günler için küçük bir uyku hedefi belirlemek ister misin? 🌙</p>`;
  return `${moodInfo?line("En sık hâl",moodInfo[1]+" "+moodInfo[2]):""}
   ${line("Yazılan şükür",sukur)}
   ${line("Kaydedilen iyilik",iyilik)}
   ${line("Su hedefi tutan gün",suOk+" / "+days.length)}
   ${avgSleep!=null?line("Ortalama uyku",Math.floor(avgSleep/60)+" sa "+avgSleep%60+" dk"):""}
   ${line("Günlük yazılan gün",jDays)}
   ${line("Kılındı işaretli namaz",kilindi+(muaf?` (+${muaf} muaf)`:""))}
   ${kazaKilinan?line("Kılınan kaza",kazaKilinan):""}
   ${topTag?line("En sık etiket",esc(topTag[0])):""}
   ${gentle}`;
}

/* Uzun süreli yoğun üzüntü kontrolü — nazik destek önerisi */
function checkWellbeing(){
  const keys=lastKeys(7);
  const sadDays=keys.filter(k=>["uzgun","kaygili"].includes(S.days[k]?.mood)).length;
  if(sadDays>=5 && !S._wbShown){
    S._wbShown=todayKey(); save();
    openModal(`<h3 style="margin-bottom:10px">🌷 Bir dost notu</h3>
     <p>Son günlerde defterine sık sık üzgün ya da kaygılı hisler not etmişsin. Bunları yazman çok kıymetli — ve bazen yükü paylaşmak da iyi gelir.</p>
     <p style="margin-top:8px">Güvendiğin bir yakınına açılmak ya da bir uzmandan (doktor, psikolog, rehber öğretmen) destek almak güçsüzlük değil; kendine gösterdiğin bir merhamettir. Dua ile birlikte profesyonel destek de bir şifa kapısıdır. 🤲</p>
     <button class="btn primary" style="width:100%;margin-top:12px" onclick="closeModal()">Teşekkürler</button>`);
  }
}

/* ══════════ [CAL] TAKVİM & ARŞİV ══════════ */
function calendarGrid(classFn,clickFn,idp){
  const y=calCursor.getFullYear(), m=calCursor.getMonth();
  const first=new Date(y,m,1), start=(first.getDay()+6)%7; // Pazartesi başlangıç
  const dim=new Date(y,m+1,0).getDate(), tk=todayKey();
  let cells="";
  for(let i=0;i<start;i++) cells+=`<span class="cal-day other"></span>`;
  for(let d=1;d<=dim;d++){
    const key=y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const extra=classFn?classFn(key):"";
    const regl=S.profile.women&&S.women.logs[key]?.regl?" regl":"";
    cells+=`<button class="cal-day ${key===tk?'today':''} ${extra}${regl}" onclick="(window._calClick||openDayDetail)('${key}')">${d}</button>`;
  }
  window._calClick=clickFn||null;
  return `<div class="cal-head">
    <button class="btn small" onclick="calMove(-1)">‹</button>
    <b class="disp">${calCursor.toLocaleDateString("tr-TR",{month:"long",year:"numeric"})}</b>
    <button class="btn small" onclick="calMove(1)">›</button></div>
   <div class="cal-grid">${["Pt","Sa","Ça","Pe","Cu","Ct","Pz"].map(d=>`<span class="dow">${d}</span>`).join("")}${cells}</div>`;
}
function calMove(n){ calCursor=new Date(calCursor.getFullYear(),calCursor.getMonth()+n,1);
  if(currentTab==="profil") renderCalendar(); else switchTab(currentTab); }
function renderCalendar(){ const box=document.getElementById("calBox"); if(!box) return;
  box.innerHTML=calendarGrid(k=>{ const d=S.days[k];
    const has=d&&(d.mood||d.sukur.some(x=>x)||Object.keys(d.prayers).length||d.water>0)||S.journal.some(j=>j.date===k);
    return has?"has":""; },null,"pcal"); }
function openDayDetail(key){
  const d=S.days[key], journals=S.journal.filter(j=>j.date===key);
  const mood=d&&MOODS.find(m=>m[0]===d.mood);
  const di=Math.floor(new Date(key).getTime()/86400000);
  const a=AYETLER[di%AYETLER.length], h=HADISLER[di%HADISLER.length], s=SOZLER[di%SOZLER.length], k2=KELIMELER[di%KELIMELER.length];
  const w=S.profile.women&&S.women.logs[key];
  const dur=d&&sleepDur(d.sleep);
  const sec=(t,c)=>c?`<hr class="divider"><b>${t}</b>${c}`:"";
  openModal(`<h3 style="margin-bottom:2px">${fmtDate(key)}</h3>
   ${d?`
   ${mood?`<p style="margin-top:8px">Hâl: ${mood[1]} ${mood[2]}</p>`:""}
   ${sec("🌷 Şükürler", d.sukur.filter(x=>x).map(x=>`<p>· ${esc(x)}</p>`).join(""))}
   ${sec("🕊️ Sabırlar", d.sabir.filter(x=>x).map(x=>`<p>· ${esc(x)}</p>`).join(""))}
   ${sec("🤲 Notlar", [["İyilik",d.iyilik],["Mutlu eden",d.mutlu],["Kendim için",d.kendim],["Yarın",d.yarin]]
      .filter(([_,v])=>v).map(([l,v])=>`<p>· <i>${l}:</i> ${esc(v)}</p>`).join(""))}
   ${sec("🕌 Namaz", Object.keys(d.prayers).length?VAKITLER.map(([kk,l])=>{
      const p=d.prayers[kk]; if(!p||!p.st)return"";
      const t=PSTATUS.find(x=>x[0]===p.st)[1];
      return `<p>· ${l}: ${t}${p.note?" — "+esc(p.note):""}</p>`; }).join(""):"")}
   ${d.water?sec("💧 Su",`<p>${d.water} / ${d.waterGoal} bardak</p>`):""}
   ${dur!=null?sec("😴 Uyku",`<p>${Math.floor(dur/60)} sa ${dur%60} dk ${d.sleep.kalite?"· "+d.sleep.kalite:""}</p>`):""}
   ${Object.keys(d.ibadet).filter(k3=>d.ibadet[k3]).length?sec("🌙 Diğer ibadetler",
      "<p>"+IBADET_EK.filter(([k3])=>d.ibadet[k3]).map(([k3,e,l])=>e+" "+l).join(" · ")+"</p>"):""}
   `:"<p class='hint' style='margin-top:8px'>Bu gün için kayıt yok.</p>"}
   ${journals.length?sec("📖 Günlük",journals.map(j=>j.locked?"<p>🔒 Kilitli kayıt</p>":
      `<p><b>${esc(j.title||"Başlıksız")}</b><br>${esc((j.text||"").slice(0,200))}${(j.text||"").length>200?"…":""}</p>${j.photo?`<img src="${j.photo}" style="max-width:100%;border-radius:10px">`:""}`).join("")):""}
   ${w?sec("🌷 Kadın sağlığı",`<p>${[w.reglStart&&"Regl başlangıcı",w.regl&&"Regl günü",w.reglEnd&&"Regl bitişi",w.agri&&"Ağrı",w.bas&&"Baş ağrısı",w.ilac&&"İlaç",w.yogunluk&&("Yoğunluk: "+w.yogunluk)].filter(Boolean).join(" · ")||"—"}${w.not?"<br>Not: "+esc(w.not):""}</p>`):""}
   <hr class="divider"><b>✨ O günün içerikleri</b>
   <p class="hint" style="margin-top:4px">Ayet: “${a.m}” (${a.s} ${a.n})<br>Hadis: “${h.m}” (${h.k})<br>Söz: “${s.m}” (${s.t})<br>Kelime: ${k2.k} — ${k2.a}</p>
   <button class="btn primary" style="width:100%;margin-top:12px" onclick="closeModal()">Kapat</button>`);
}

/* ══════════ [NOTF] BİLDİRİMLER ══════════ */
function explainAndAskNotif(){
  openModal(`<h3 style="margin-bottom:10px">🔔 Bildirimler ne işe yarar?</h3>
   <p>İzin verirsen Hâl, sen bu sekme açıkken sana nazik hatırlatmalar gösterir: bir şükür sorusu, günün ayeti, su içme ya da günlük yazma hatırlatması gibi.</p>
   <p class="hint" style="margin-top:8px">Önemli: Bu bir web sayfası olduğu için <b>tarayıcı veya sekme kapalıyken bildirim gönderilemez</b>. Güvenilir arka plan bildirimi için uygulamanın PWA'ya dönüştürülüp bir sunucudan push gönderilmesi gerekir. Bu sürümde bildirimler yalnızca uygulama açıkken çalışır.</p>
   <div class="row" style="margin-top:12px"><button class="btn grow" onclick="closeModal()">Şimdi değil</button>
   <button class="btn primary grow" onclick="reqNotifPermission()">İzin ver</button></div>`);
}
function reqNotifPermission(){ closeModal();
  if(!("Notification" in window)) return toast("Bu tarayıcı bildirimleri desteklemiyor.");
  Notification.requestPermission().then(p=>{
    if(p==="granted"){ toast("Bildirim izni verildi 🔔"); scheduleNotifs();
      new Notification("Hâl 🌿",{body:"Bildirimler hazır. Hatırlatmalar bu sekme açıkken gelecek."}); }
    else toast("İzin verilmedi; bildirimler kapalı kalacak."); });
}
function setNotifMode(v){ S.profile.notif.mode=v; save(); switchTab("profil"); scheduleNotifs();
  if(v!=="kapali"&&("Notification" in window)&&Notification.permission!=="granted") explainAndAskNotif(); }
function randInRange(a,b){ // "HH:MM" aralığında bugüne ait rastgele Date
  const [h1,m1]=a.split(":").map(Number),[h2,m2]=b.split(":").map(Number);
  const t1=h1*60+m1, t2=h2*60+m2, t=t1+Math.floor(Math.random()*(t2-t1));
  const d=new Date(); d.setHours(Math.floor(t/60),t%60,0,0); return d;
}
function scheduleNotifs(){
  if(notifTimer) clearTimeout(notifTimer);
  const cfg=S.profile?.notif; if(!cfg||cfg.mode==="kapali") return;
  if(!("Notification" in window)||Notification.permission!=="granted") return;
  const R=cfg.ranges, now=new Date(); let times=[];
  if(cfg.mode==="1") times=[randInRange(...R.ogle)];
  else if(cfg.mode==="2") times=[randInRange(...R.sabah),randInRange(...R.aksam)];
  else if(cfg.mode==="3") times=[randInRange(...R.sabah),randInRange(...R.ogle),randInRange(...R.aksam)];
  else if(cfg.mode==="sabah") times=[randInRange(...R.sabah)];
  else if(cfg.mode==="aksam") times=[randInRange(...R.aksam)];
  else if(cfg.mode==="ozel") times=cfg.hours.map(h=>{ const [hh,mm]=h.split(":").map(Number);
    const d=new Date(); d.setHours(hh,mm,0,0); return d; });
  times=times.filter(t=>t>now).sort((a,b)=>a-b);
  const next=times[0];
  if(!next){ // yarın için gece yarısından sonra yeniden planla
    const mid=new Date(); mid.setHours(24,0,30,0);
    notifTimer=setTimeout(scheduleNotifs, mid-now); return; }
  notifTimer=setTimeout(()=>{
    const msg=NOTIF_POOL[Math.floor(Math.random()*NOTIF_POOL.length)]();
    try{ new Notification("Hâl 🌿",{body:msg}); }catch(e){ toast(msg); }
    scheduleNotifs();
  }, next-now);
}

/* ══════════ BAŞLATMA ══════════ */
function applyTheme(){
  document.documentElement.dataset.theme=S.profile?.theme||"light";
  document.documentElement.dataset.elder=S.profile?.elder?"1":"0";
  document.documentElement.dataset.child=isChild()?"1":"0";
  const tb=document.getElementById("themeBtn"); if(tb) tb.textContent=S.profile?.theme==="dark"?"☀️":"🌙";
}
function boot(){
  applyTheme();
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("nav").classList.remove("hidden");
  document.querySelectorAll("nav.bottom button").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
  document.getElementById("themeBtn").onclick=()=>{ S.profile.theme=S.profile.theme==="dark"?"light":"dark"; save(); applyTheme(); };
  switchTab("bugun"); scheduleNotifs();
  const openable=S.future.filter(f=>!f.opened&&todayKey()>=f.openDate);
  if(openable.length) setTimeout(()=>toast("💌 Geçmişteki senden bir mesaj var — Günlük sekmesine bak."),900);
}
(function init(){
  if(!S.profile){ showOnboard(); return; }
  if(S.profile.pin){ applyTheme(); showLock(boot); } else boot();
})();
