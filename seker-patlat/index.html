<!doctype html>
<html lang="tr">
<meta charset="utf-8">
<title>ŞEKER PATLAT — Eşleştir, Patlat, Kazan</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  :root{ --bg:#fdeef7; --board:#fff; --ink:#7a3b5e; --dim:#c48aa8; --gold:#ff9f1c; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:"Avenir Next","Futura","Trebuchet MS",system-ui,sans-serif;
    -webkit-user-select:none;user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent;
    background-image:radial-gradient(circle at 20% 10%,rgba(255,159,28,.12),transparent 40%),
      radial-gradient(circle at 80% 90%,rgba(255,95,162,.12),transparent 40%)}
  #wrap{height:100%;display:flex;flex-direction:column;align-items:center;gap:8px;
    padding:max(10px,env(safe-area-inset-top)) 10px max(10px,env(safe-area-inset-bottom))}
  #hud{width:min(94vw,440px);display:flex;justify-content:space-between;align-items:center}
  .label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);font-weight:700}
  .value{font-size:21px;font-weight:800;font-variant-numeric:tabular-nums}
  #goalbar{width:min(94vw,440px);height:14px;background:#f7d8e8;border-radius:99px;overflow:hidden}
  #goalfill{height:100%;width:0%;border-radius:99px;transition:width .3s;
    background:linear-gradient(90deg,#ff5fa2,#ff9f1c)}
  #board{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;width:100%}
  canvas{display:block;border-radius:18px;background:#fff;box-shadow:0 8px 30px rgba(122,59,94,.15)}
  .card{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;text-align:center;background:rgba(253,238,247,.96);
    transition:opacity .3s;padding:24px;z-index:10}
  .card.hidden{opacity:0;pointer-events:none;visibility:hidden;transition:opacity .3s,visibility 0s .3s}
  .card.hidden .btn{pointer-events:none}
  .card h1{font-size:clamp(38px,10vw,76px);font-weight:900;line-height:.98;
    background:linear-gradient(180deg,#ff9f1c,#ff5fa2);
    -webkit-background-clip:text;background-clip:text;color:transparent;transform:rotate(-2deg)}
  .card p{max-width:34ch;color:var(--dim);font-size:15px;line-height:1.5}
  .card .big{font-size:34px;font-weight:800;color:var(--gold)}
  .btn{font:inherit;font-weight:800;font-size:16px;letter-spacing:.06em;text-transform:uppercase;
    color:#fff;background:linear-gradient(180deg,#ff5fa2,#e8447f);border:none;border-radius:999px;
    padding:14px 38px;cursor:pointer;box-shadow:0 5px 0 #a82858}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #a82858}
  .btn:focus-visible{outline:3px solid var(--ink);outline-offset:3px}
</style>

<div id="wrap">
  <div id="hud">
    <div><div class="label">Bölüm</div><div class="value" id="lvlEl">1</div></div>
    <div style="text-align:center"><div class="label">Hedef</div><div class="value" id="scoreEl">0</div></div>
    <div style="text-align:right"><div class="label">Hamle</div><div class="value" id="movesEl">25</div></div>
  </div>
  <div id="goalbar"><div id="goalfill"></div></div>
  <div id="board"><canvas id="cv"></canvas></div>
</div>

<div class="card" id="intro">
  <h1>ŞEKER PATLAT</h1>
  <p>Yan yana iki şekeri kaydırarak yer değiştir, 3'lü sıra yap, patlat! Hamlelerin bitmeden hedefe ulaş. Reklamsız, ücretsiz, çocuk dostu. 🍭</p>
  <button class="btn" id="startBtn">Oyna</button>
  <span style="font-size:12px;letter-spacing:.12em;color:var(--dim)" id="bestIntro"></span>
</div>

<div class="card hidden" id="endcard">
  <h1 id="endTitle"></h1>
  <div class="big" id="endScore"></div>
  <p id="endMsg"></p>
  <button class="btn" id="nextBtn"></button>
</div>

<script>
'use strict';
const N=8, TYPES=5;
const EMO=['🍬','🍭','🍩','🧁','🍓','🍪'];
const COLS=['#ff5fa2','#5fc8f0','#c98f5f','#a06fe8','#ff6b6b','#e8b45f'];
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let CELL=44, DPR=1;
function resize(){
  DPR=Math.min(devicePixelRatio||1,2);
  const b=document.getElementById('board');
  CELL=Math.floor(Math.min(b.clientWidth*0.94,b.clientHeight*0.98,460)/N);
  cv.style.width=cv.style.height=CELL*N+'px';
  cv.width=cv.height=CELL*N*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize',resize);

let AC=null;
const audio=()=>{ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended')AC.resume(); return AC; };
function blip(f,d=0.08,v=0.15,t='triangle'){ try{ const a=audio(),n=a.currentTime,o=a.createOscillator(),g=a.createGain();
  o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(0.001,n+d);
  o.connect(g).connect(a.destination);o.start(n);o.stop(n+d+0.02);}catch(e){} }
const buzz=ms=>{ try{ navigator.vibrate&&navigator.vibrate(ms); }catch(e){} };

let grid, level, score, goal, moves, state='intro', busy=false, particles=[], offsetY=[], tick=0;
let best=0; try{ best=+localStorage.getItem('seker_best')||0; }catch(e){}
document.getElementById('bestIntro').textContent=best>1?'EN İYİ BÖLÜMÜN: '+best:'';

function randT(){ return Math.floor(Math.random()*TYPES); }
function makeGrid(){
  grid=Array.from({length:N},()=>Array(N).fill(0).map(randT));
  // başlangıçta hazır eşleşme olmasın
  let guard=0;
  while(findMatches().length&&guard++<200){
    for(const m of findMatches()) grid[m.y][m.x]=randT();
  }
}
function findMatches(){
  const out=[];
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    const v=grid[y][x]; if(v<0)continue;
    if(x<N-2&&grid[y][x+1]===v&&grid[y][x+2]===v) out.push({x,y},{x:x+1,y},{x:x+2,y});
    if(y<N-2&&grid[y+1][x]===v&&grid[y+2][x]===v) out.push({x,y},{x,y:y+1},{x,y:y+2});
  }
  const seen=new Set(), uniq=[];
  for(const m of out){ const k=m.x+','+m.y; if(!seen.has(k)){seen.add(k);uniq.push(m);} }
  return uniq;
}
function hasMove(){
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    for(const [dx,dy] of [[1,0],[0,1]]){
      const nx=x+dx,ny=y+dy; if(nx>=N||ny>=N)continue;
      [grid[y][x],grid[ny][nx]]=[grid[ny][nx],grid[y][x]];
      const ok=findMatches().length>0;
      [grid[y][x],grid[ny][nx]]=[grid[ny][nx],grid[y][x]];
      if(ok) return true;
    }
  }
  return false;
}
function startLevel(n){
  level=n; goal=800+n*400; moves=25; score=0;
  makeGrid(); offsetY=Array.from({length:N},()=>Array(N).fill(0));
  updHud(); state='play';
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('endcard').classList.add('hidden');
  save();
}
function updHud(){
  document.getElementById('lvlEl').textContent=level;
  document.getElementById('scoreEl').textContent=score+' / '+goal;
  document.getElementById('movesEl').textContent=moves;
  document.getElementById('goalfill').style.width=Math.min(100,score/goal*100)+'%';
}
function save(){
  try{ localStorage.setItem('seker_save',JSON.stringify({grid,level,score,goal,moves})); }catch(e){}
}
async function clearAndFall(){
  let chain=0;
  while(true){
    const m=findMatches();
    if(!m.length) break;
    chain++;
    score+=m.length*10*chain;
    for(const c of m){
      for(let i=0;i<6;i++) particles.push({x:(c.x+.5)*CELL,y:(c.y+.5)*CELL,
        vx:(Math.random()-.5)*5,vy:-Math.random()*4,life:1,col:COLS[grid[c.y][c.x]],size:Math.random()*5+3});
      grid[c.y][c.x]=-1;
    }
    blip(400+chain*100,0.12,0.18); buzz(12);
    updHud();
    await new Promise(r=>setTimeout(r,180));
    // düşür
    for(let x=0;x<N;x++){
      const col=[];
      for(let y=N-1;y>=0;y--) if(grid[y][x]>=0) col.push(grid[y][x]);
      for(let y=N-1;y>=0;y--){
        const nv=col[N-1-y];
        if(nv===undefined){ grid[y][x]=randT(); offsetY[y][x]=-(y+1)*CELL*0.6; }
        else{ if(grid[y][x]!==nv) offsetY[y][x]=-CELL*0.4; grid[y][x]=nv; }
      }
    }
    await new Promise(r=>setTimeout(r,160));
  }
  if(!hasMove()){ makeGrid(); blip(200,0.3,0.15,'sawtooth'); }
  save();
  if(score>=goal){ endLevel(true); return; }
  if(moves<=0){ endLevel(false); return; }
}
function endLevel(won){
  state='over';
  const t=document.getElementById('endTitle'), m2=document.getElementById('endMsg'),
        s=document.getElementById('endScore'), b=document.getElementById('nextBtn');
  if(won){
    const bonus=moves*30; score+=bonus;
    if(level+1>best){ best=level+1; try{localStorage.setItem('seker_best',best);}catch(e){} }
    t.textContent='Şahane! 🎉'; s.textContent=score+' puan';
    m2.textContent='Kalan '+moves+' hamle için +'+bonus+' bonus! Bölüm '+(level+1)+' seni bekliyor.';
    b.textContent='Sonraki Bölüm'; b._fn=()=>startLevel(level+1);
    blip(523,0.2,0.2); blip(659,0.25,0.15);
  } else {
    t.textContent='Hamle Bitti 🍬'; s.textContent=score+' / '+goal;
    m2.textContent='Az kaldı! Köşelerden patlatmak zincirleme bonus getirir.';
    b.textContent='Tekrar Dene'; b._fn=()=>startLevel(level);
  }
  try{ localStorage.removeItem('seker_save'); }catch(e){}
  document.getElementById('endcard').classList.remove('hidden');
}

/* girdi: sürükleyerek takas */
let selC=null, dragX=0, dragY=0;
function cellAt(px,py){
  const r=cv.getBoundingClientRect();
  const x=Math.floor((px-r.left)/CELL), y=Math.floor((py-r.top)/CELL);
  if(x<0||x>=N||y<0||y>=N) return null; return {x,y};
}
function pt(e){ const t=e.touches?e.touches[0]:e; return {x:t.clientX,y:t.clientY}; }
function down(e){ if(state!=='play'||busy||e.target.closest('.card'))return;
  const p=pt(e); selC=cellAt(p.x,p.y); dragX=p.x; dragY=p.y; audio(); }
async function move(e){
  if(!selC||busy) return;
  const p=pt(e), dx=p.x-dragX, dy=p.y-dragY;
  if(Math.abs(dx)<CELL*0.4&&Math.abs(dy)<CELL*0.4) return;
  const dir=Math.abs(dx)>Math.abs(dy)?{x:Math.sign(dx),y:0}:{x:0,y:Math.sign(dy)};
  const t={x:selC.x+dir.x,y:selC.y+dir.y};
  if(t.x<0||t.x>=N||t.y<0||t.y>=N){ selC=null; return; }
  busy=true;
  const a=selC; selC=null;
  [grid[a.y][a.x],grid[t.y][t.x]]=[grid[t.y][t.x],grid[a.y][a.x]];
  if(findMatches().length){
    moves--; updHud(); blip(350,0.06,0.12);
    await clearAndFall();
  } else {
    // geri al
    blip(180,0.1,0.1,'sawtooth');
    await new Promise(r=>setTimeout(r,120));
    [grid[a.y][a.x],grid[t.y][t.x]]=[grid[t.y][t.x],grid[a.y][a.x]];
  }
  busy=false;
}
addEventListener('touchstart',down,{passive:true});
addEventListener('touchmove',move,{passive:true});
addEventListener('touchend',()=>{ selC=null; });
addEventListener('mousedown',down); addEventListener('mousemove',move);
addEventListener('mouseup',()=>{ selC=null; });

function draw(){
  tick++;
  ctx.clearRect(0,0,N*CELL,N*CELL);
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    if((x+y)%2===0){ ctx.fillStyle='#fdf3f8'; ctx.fillRect(x*CELL,y*CELL,CELL,CELL); }
  }
  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    const v=grid?.[y]?.[x]; if(v===undefined||v<0) continue;
    if(offsetY[y][x]<0) offsetY[y][x]=Math.min(0,offsetY[y][x]+CELL*0.18);
    const sel=selC&&selC.x===x&&selC.y===y;
    const bob=sel?Math.sin(tick*0.3)*2:0;
    ctx.font=(CELL*0.68)+'px system-ui';
    ctx.fillText(EMO[v],(x+.5)*CELL,(y+.5)*CELL+offsetY[y][x]+bob);
  }
  for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=0.04;
    ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,6.28); ctx.fill(); }
  ctx.globalAlpha=1;
  particles=particles.filter(p=>p.life>0);
  requestAnimationFrame(draw);
}
function tap(el,fn){ if(fn)el._fn=fn;
  const fire=e=>{ e.preventDefault(); e.stopPropagation(); if(el._fn)el._fn(); };
  el.addEventListener('click',fire); el.addEventListener('touchend',fire); }
tap(document.getElementById('startBtn'),()=>{ try{audio();}catch(e){}
  if(resumeData){ ({grid,level,score,goal,moves}=resumeData); resumeData=null;
    offsetY=Array.from({length:N},()=>Array(N).fill(0));
    updHud(); state='play';
    document.getElementById('intro').classList.add('hidden');
  } else startLevel(1); });
tap(document.getElementById('nextBtn'),null);

resize();
let resumeData=null;
try{ const s=JSON.parse(localStorage.getItem('seker_save'));
  if(s&&s.grid&&s.moves>0){ resumeData=s;
    document.getElementById('startBtn').textContent='Devam Et (Bölüm '+s.level+')'; } }catch(e){}
makeGrid(); offsetY=Array.from({length:N},()=>Array(N).fill(0));
level=1;score=0;goal=1200;moves=25;
draw();
</script>
