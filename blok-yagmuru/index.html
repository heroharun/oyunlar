<!doctype html>
<html lang="tr">
<meta charset="utf-8">
<title>BLOK YAĞMURU — Düşen Bloklar</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  :root{ --bg:#10121f; --panel:#1a1e33; --ink:#eef1ff; --dim:#8b93b8;
    --accent:#5fd4f0; --gold:#ffd166; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg);
    font-family:"Avenir Next","Futura","Trebuchet MS",system-ui,sans-serif;
    -webkit-user-select:none;user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent}
  #wrap{height:100%;display:flex;flex-direction:column;align-items:center;
    padding:max(8px,env(safe-area-inset-top)) 8px max(8px,env(safe-area-inset-bottom))}
  #hud{width:min(94vw,420px);display:flex;justify-content:space-between;align-items:center;
    padding:6px 4px;color:var(--ink)}
  .hudbox{display:flex;flex-direction:column;gap:0}
  .hudbox.right{align-items:flex-end}
  .label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);font-weight:600}
  .value{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1}
  #next{width:52px;height:40px}
  #board{flex:1;min-height:0;display:flex;justify-content:center;width:100%}
  canvas{display:block}
  #btns{display:flex;gap:8px;margin-top:8px;width:min(94vw,420px)}
  .b{flex:1;height:64px;border-radius:16px;border:2px solid rgba(95,212,240,.3);
    background:rgba(95,212,240,.08);color:var(--ink);font-size:24px;
    display:flex;align-items:center;justify-content:center}
  .b:active,.b.on{background:rgba(95,212,240,.3)}
  .b.drop{border-color:rgba(255,209,102,.4);background:rgba(255,209,102,.1);color:var(--gold)}
  .b.drop:active{background:rgba(255,209,102,.3)}
  @media(hover:hover) and (pointer:fine){ #btns{display:none} }

  .card{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;text-align:center;color:var(--ink);
    background:rgba(16,18,31,.93);transition:opacity .35s;padding:24px;z-index:10}
  .card.hidden{opacity:0;pointer-events:none;visibility:hidden;transition:opacity .35s,visibility 0s .35s}
  .card.hidden .btn{pointer-events:none}
  .card h1{font-size:clamp(38px,10vw,80px);font-weight:900;line-height:.95;
    background:linear-gradient(180deg,#5fd4f0,#c44dff);
    -webkit-background-clip:text;background-clip:text;color:transparent;transform:rotate(-2deg)}
  .card p{max-width:36ch;color:var(--dim);font-size:14px;line-height:1.5}
  .card .big{font-size:34px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums}
  .btn{pointer-events:auto;font:inherit;font-weight:800;font-size:16px;letter-spacing:.08em;
    text-transform:uppercase;color:#0e1420;background:linear-gradient(180deg,#5fd4f0,#3aa8d8);
    border:none;border-radius:999px;padding:14px 36px;cursor:pointer;
    box-shadow:0 5px 0 #1e6f96;transition:transform .08s,box-shadow .08s}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #1e6f96}
  .btn.alt{background:linear-gradient(180deg,#ffd166,#ff9f43);box-shadow:0 5px 0 #b3561e}
  .btn.alt:active{box-shadow:0 2px 0 #b3561e}
  .btn:focus-visible{outline:3px solid var(--ink);outline-offset:3px}
  #pauseBtn{position:fixed;top:10px;right:12px;z-index:5;font-size:16px;color:var(--dim);
    background:rgba(95,212,240,.08);border:1.5px solid rgba(95,212,240,.3);
    border-radius:999px;padding:8px 14px;cursor:pointer;display:none}
  #pauseBtn.show{display:block}
</style>

<div id="wrap">
  <div id="hud">
    <div class="hudbox"><span class="label">Skor</span><span class="value" id="scoreEl">0</span></div>
    <div class="hudbox"><span class="label">Satır</span><span class="value" id="linesEl">0</span></div>
    <div class="hudbox"><span class="label">Seviye</span><span class="value" id="levelEl">1</span></div>
    <div class="hudbox right"><span class="label">Sıradaki</span><canvas id="next"></canvas></div>
  </div>
  <div id="board"><canvas id="cv"></canvas></div>
  <div id="btns">
    <div class="b" id="bL">◀</div>
    <div class="b" id="bR">▶</div>
    <div class="b" id="bRot">⟳</div>
    <div class="b drop" id="bDrop">⤓</div>
  </div>
</div>
<button id="pauseBtn">⏸ durdur</button>

<div class="card" id="intro">
  <h1>BLOK YAĞMURU</h1>
  <p>Düşen blokları döndür, boşluksuz sırala. Satır tamamlanınca silinir — 4 satır birden = büyük puan. Oyun kendini kaydeder, istediğin an bırak.</p>
  <p class="hint" id="ctlHint" style="font-size:12px;letter-spacing:.1em;color:var(--dim)"></p>
  <button class="btn" id="contBtn" style="display:none">Devam Et</button>
  <button class="btn alt" id="startBtn">Yeni Oyun</button>
  <span style="font-size:12px;letter-spacing:.14em;color:var(--dim)" id="bestIntro"></span>
</div>

<div class="card hidden" id="pausecard">
  <h1>Mola</h1>
  <p>Bloklar sabırlı. Oyun kayıtlı — istersen kapat, sonra devam et.</p>
  <button class="btn" id="resumeBtn">Devam</button>
  <button class="btn alt" id="restartBtn">Yeni Oyun</button>
</div>

<div class="card hidden" id="endcard">
  <h1>Yığıldı!</h1>
  <div class="big" id="endScore"></div>
  <p id="endMsg"></p>
  <button class="btn" id="retryBtn">Tekrar</button>
</div>

<script>
'use strict';
const COLS=10, ROWS=20;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const ncv=document.getElementById('next'), nctx=ncv.getContext('2d');
let CELL=24, OX=0, DPR=1;
function resize(){
  DPR=Math.min(devicePixelRatio||1,2);
  const bw=document.getElementById('board').clientWidth,
        bh=document.getElementById('board').clientHeight;
  CELL=Math.floor(Math.min(bw/COLS, bh/ROWS));
  cv.style.width=CELL*COLS+'px'; cv.style.height=CELL*ROWS+'px';
  cv.width=CELL*COLS*DPR; cv.height=CELL*ROWS*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
  ncv.width=52*DPR; ncv.height=40*DPR; nctx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize',()=>{ resize(); draw(); });

let AC=null;
const audio=()=>{ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended')AC.resume(); return AC; };
function blip(f,d=0.07,v=0.18,t='square'){ try{ const a=audio(),n=a.currentTime,o=a.createOscillator(),g=a.createGain();
  o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(0.001,n+d);
  o.connect(g).connect(a.destination);o.start(n);o.stop(n+d+0.02);}catch(e){} }
const buzz=ms=>{ try{ navigator.vibrate&&navigator.vibrate(ms); }catch(e){} };

/* parçalar */
const SHAPES={
  I:[[0,1],[1,1],[2,1],[3,1]], O:[[1,0],[2,0],[1,1],[2,1]],
  T:[[1,0],[0,1],[1,1],[2,1]], S:[[1,0],[2,0],[0,1],[1,1]],
  Z:[[0,0],[1,0],[1,1],[2,1]], J:[[0,0],[0,1],[1,1],[2,1]],
  L:[[2,0],[0,1],[1,1],[2,1]] };
const COLORS={I:'#5fd4f0',O:'#ffd166',T:'#c44dff',S:'#5ff08d',Z:'#ff5f7a',J:'#548bff',L:'#ff9f43'};
const KEYS=Object.keys(SHAPES);

let grid, cur, nxt, score, lines, level, state='intro', tick=0, dropT=0, particles=[];
let best=0; try{ best=+localStorage.getItem('blok_best')||0; }catch(e){}
document.getElementById('bestIntro').textContent= best>0?'REKORUN: '+best.toLocaleString('tr-TR'):'';

const IS_TOUCH=matchMedia('(pointer:coarse)').matches||'ontouchstart' in window;
document.getElementById('ctlHint').textContent = IS_TOUCH
  ? 'BUTONLAR: sol · sağ · döndür · bırak — tahtayı sola/sağa kaydırarak da oynayabilirsin'
  : '← → hareket · ↑ döndür · Boşluk bırak · ↓ hızlı in';

function newPiece(k){ k=k||KEYS[Math.floor(Math.random()*KEYS.length)];
  return {k, cells:SHAPES[k].map(c=>[...c]), x:3, y:-1}; }
function cellsOf(p){ return p.cells.map(([cx,cy])=>[p.x+cx,p.y+cy]); }
function fits(p,dx=0,dy=0,cells){
  return (cells||p.cells).every(([cx,cy])=>{
    const x=p.x+cx+dx, y=p.y+cy+dy;
    return x>=0&&x<COLS&&y<ROWS&&(y<0||!grid[y][x]); });
}
function rotate(p){
  if(p.k==='O') return;
  const r=p.cells.map(([x,y])=>[3-y-(p.k==='I'?0:1),x]);
  for(const kick of [0,-1,1,-2,2]) if(fits(p,kick,0,r)){ p.cells=r; p.x+=kick; blip(520,0.05,0.12); return; }
}
function reset(){
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  cur=newPiece(); nxt=newPiece(); score=0; lines=0; level=1; dropT=0; particles=[];
  updateHud(); save();
}
function updateHud(){
  document.getElementById('scoreEl').textContent=score.toLocaleString('tr-TR');
  document.getElementById('linesEl').textContent=lines;
  document.getElementById('levelEl').textContent=level;
  drawNext();
}

/* kayıt: her kilitte */
function save(){
  try{ localStorage.setItem('blok_save',JSON.stringify({grid,cur,nxt,score,lines,level})); }catch(e){}
}
function clearSave(){ try{ localStorage.removeItem('blok_save'); }catch(e){} }
function loadSave(){
  try{ const s=JSON.parse(localStorage.getItem('blok_save'));
    if(!s||!s.grid) return false;
    ({score,lines,level}=s); grid=s.grid; cur=s.cur; nxt=s.nxt;
    updateHud(); return true;
  }catch(e){ return false; }
}

function lock(){
  for(const [x,y] of cellsOf(cur)){ if(y<0){ gameOver(); return; } grid[y][x]=COLORS[cur.k]; }
  blip(180,0.06,0.15,'sine');
  // satır temizle
  let cleared=0;
  for(let y=ROWS-1;y>=0;y--){
    if(grid[y].every(c=>c)){
      cleared++;
      for(let x=0;x<COLS;x++) for(let i=0;i<3;i++)
        particles.push({x:(x+.5)*CELL,y:(y+.5)*CELL,vx:(Math.random()-.5)*4,vy:-Math.random()*3,
          life:1,col:grid[y][x],size:Math.random()*4+2});
      grid.splice(y,1); grid.unshift(Array(COLS).fill(null)); y++;
    }
  }
  if(cleared){
    const pts=[0,100,300,500,800][cleared]*level;
    score+=pts; lines+=cleared;
    level=1+Math.floor(lines/10);
    blip(300+cleared*120,0.2,0.2,'triangle'); buzz(cleared*15);
  }
  cur=nxt; nxt=newPiece();
  updateHud(); save();
  if(!fits(cur)) gameOver();
}
function hardDrop(){ if(state!=='play')return;
  let d=0; while(fits(cur,0,d+1)) d++;
  score+=d*2; cur.y+=d; blip(140,0.08,0.2); buzz(10); lock(); updateHud(); }
function move(dx){ if(state==='play'&&fits(cur,dx,0)){ cur.x+=dx; blip(400,0.03,0.06); } }
function softDrop(){ if(state==='play'&&fits(cur,0,1)){ cur.y++; score++; } }

function step(){
  tick++;
  dropT++;
  const speed=Math.max(6,48-(level-1)*4);
  if(dropT>=speed){ dropT=0;
    if(fits(cur,0,1)) cur.y++;
    else lock();
  }
  for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.03; }
  particles=particles.filter(p=>p.life>0);
}

function gameOver(){
  state='over'; setPause(false); clearSave();
  const nb=score>best; if(nb){ best=score; try{localStorage.setItem('blok_best',best);}catch(e){} }
  document.getElementById('endScore').textContent=score.toLocaleString('tr-TR')+' puan';
  document.getElementById('endMsg').textContent=(nb?'YENİ REKOR! 🏆 ':'Rekor: '+best.toLocaleString('tr-TR')+' · ')
    +lines+' satır sildin, seviye '+level+"'e ulaştın.";
  document.getElementById('endcard').classList.remove('hidden');
  try{ const a=audio(),t=a.currentTime,o=a.createOscillator(),g=a.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(40,t+0.7);
    g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.7);
    o.connect(g).connect(a.destination);o.start(t);o.stop(t+0.75);}catch(e){}
}

/* çizim */
function cell(c,x,y,col,ghost){
  const px=x*CELL,py=y*CELL,r=Math.max(3,CELL*0.18);
  c.beginPath(); c.moveTo(px+r,py+1);
  c.arcTo(px+CELL-1,py+1,px+CELL-1,py+CELL-1,r); c.arcTo(px+CELL-1,py+CELL-1,px+1,py+CELL-1,r);
  c.arcTo(px+1,py+CELL-1,px+1,py+1,r); c.arcTo(px+1,py+1,px+CELL-1,py+1,r); c.closePath();
  if(ghost){ c.strokeStyle=col; c.globalAlpha=0.35; c.lineWidth=2; c.stroke(); c.globalAlpha=1; return; }
  c.fillStyle=col; c.fill();
  c.fillStyle='rgba(255,255,255,.25)';
  c.fillRect(px+3,py+2,CELL-6,Math.max(3,CELL*0.22));
}
function draw(){
  ctx.fillStyle='#141830'; ctx.fillRect(0,0,COLS*CELL,ROWS*CELL);
  ctx.strokeStyle='rgba(139,147,184,.08)'; ctx.lineWidth=1;
  for(let x=1;x<COLS;x++){ ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,ROWS*CELL); ctx.stroke(); }
  for(let y=1;y<ROWS;y++){ ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(COLS*CELL,y*CELL); ctx.stroke(); }
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++) if(grid[y][x]) cell(ctx,x,y,grid[y][x]);
  if(state==='play'||state==='paused'){
    let d=0; while(fits(cur,0,d+1)) d++;
    for(const [x,y] of cellsOf(cur)) if(y+d>=0) cell(ctx,x,y+d,COLORS[cur.k],true);
    for(const [x,y] of cellsOf(cur)) if(y>=0) cell(ctx,x,y,COLORS[cur.k]);
  }
  for(const p of particles){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.col;
    ctx.fillRect(p.x,p.y,p.size,p.size); }
  ctx.globalAlpha=1;
}
function drawNext(){
  nctx.clearRect(0,0,52,40);
  if(!nxt) return;
  const s=10;
  const xs=nxt.cells.map(c=>c[0]), ys=nxt.cells.map(c=>c[1]);
  const w=(Math.max(...xs)-Math.min(...xs)+1)*s, h=(Math.max(...ys)-Math.min(...ys)+1)*s;
  for(const [x,y] of nxt.cells){
    nctx.fillStyle=COLORS[nxt.k];
    nctx.fillRect((x-Math.min(...xs))*s+(52-w)/2,(y-Math.min(...ys))*s+(40-h)/2,s-1,s-1);
  }
}

/* girdi */
addEventListener('keydown',e=>{
  if(state!=='play'){ if(e.code==='Escape'&&state==='paused') resume(); return; }
  if(e.code==='ArrowLeft') move(-1);
  else if(e.code==='ArrowRight') move(1);
  else if(e.code==='ArrowUp') rotate(cur);
  else if(e.code==='ArrowDown') softDrop();
  else if(e.code==='Space'){ hardDrop(); e.preventDefault(); }
  else if(e.code==='Escape'||e.code==='KeyP') doPause();
});
function hold(id,fn,repeat){
  const el=document.getElementById(id);
  let iv=null;
  const start=e=>{ e.preventDefault(); el.classList.add('on'); audio(); fn();
    if(repeat) iv=setInterval(fn,110); };
  const end=e=>{ e&&e.preventDefault(); el.classList.remove('on'); if(iv){clearInterval(iv);iv=null;} };
  el.addEventListener('touchstart',start,{passive:false});
  el.addEventListener('touchend',end); el.addEventListener('touchcancel',end);
  el.addEventListener('mousedown',start); el.addEventListener('mouseup',end); el.addEventListener('mouseleave',end);
}
hold('bL',()=>move(-1),true); hold('bR',()=>move(1),true);
hold('bRot',()=>rotate(cur),false); hold('bDrop',hardDrop,false);
/* tahta üstünde kaydırma */
let swX=null,swY=null,swMoved=false;
cv.addEventListener('touchstart',e=>{ const t=e.changedTouches[0]; swX=t.clientX; swY=t.clientY; swMoved=false; },{passive:true});
cv.addEventListener('touchmove',e=>{
  if(swX===null) return;
  const t=e.changedTouches[0], dx=t.clientX-swX, dy=t.clientY-swY;
  if(Math.abs(dx)>CELL*0.9){ move(dx>0?1:-1); swX=t.clientX; swMoved=true; }
  if(dy>CELL*1.2){ softDrop(); swY=t.clientY; swMoved=true; }
},{passive:true});
cv.addEventListener('touchend',e=>{
  if(!swMoved) rotate(cur);            // dokunuş = döndür
  swX=swY=null;
});

function tap(el,fn){ el._fn=fn;
  const fire=e=>{ e.preventDefault(); e.stopPropagation(); if(el._fn)el._fn(); };
  el.addEventListener('click',fire); el.addEventListener('touchend',fire); }

/* akış */
const pauseBtn=document.getElementById('pauseBtn');
function setPause(v){ pauseBtn.classList.toggle('show',v); }
function doPause(){ if(state!=='play')return; state='paused'; save();
  document.getElementById('pausecard').classList.remove('hidden'); }
function resume(){ state='play'; document.getElementById('pausecard').classList.add('hidden'); }
tap(pauseBtn,doPause);
document.addEventListener('visibilitychange',()=>{ if(document.hidden)doPause(); });
tap(document.getElementById('resumeBtn'),resume);
tap(document.getElementById('restartBtn'),()=>{ reset(); resume(); });
tap(document.getElementById('startBtn'),()=>{ try{audio();}catch(e){}
  reset(); state='play'; setPause(true);
  document.getElementById('intro').classList.add('hidden'); });
tap(document.getElementById('contBtn'),()=>{ try{audio();}catch(e){}
  state='play'; setPause(true);
  document.getElementById('intro').classList.add('hidden'); });
tap(document.getElementById('retryBtn'),()=>{ reset(); state='play'; setPause(true);
  document.getElementById('endcard').classList.add('hidden'); });

function loop(){ if(state==='play') step(); draw(); requestAnimationFrame(loop); }
resize(); reset();
if(loadSave()) document.getElementById('contBtn').style.display='';
loop();
</script>
