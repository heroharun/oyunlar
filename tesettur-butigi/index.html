<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesettür Butiği — Giydirme Oyunu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--keten:#F5EFE4;--keten2:#EDE4D3;--murdum:#432D3D;--gul:#C98C8C;--gul-koyu:#B0716F;--adacayi:#A8B48A;--altin:#C9A25E;--beyaz:#FFFDF8}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Nunito',system-ui,sans-serif;background:var(--keten);color:var(--murdum);display:flex;flex-direction:column;align-items:center;min-height:100vh}
h1,h2,h3,.serif{font-family:'Fraunces',Georgia,serif}
.ekran{display:none;width:100%;max-width:560px;padding:20px 14px 40px;flex-direction:column;align-items:center}
.ekran.aktif{display:flex}
.logo{font-size:34px;font-weight:700;text-align:center;line-height:1.1;margin-top:26px}
.logo em{font-style:italic;color:var(--gul-koyu)}
.alt-baslik{margin-top:10px;font-size:14px;color:#7a6672;text-align:center;max-width:300px}
.susleme{margin:18px 0 6px;color:var(--altin);letter-spacing:6px;font-size:13px}
.btn{border:none;cursor:pointer;font-family:'Nunito';font-weight:800;border-radius:999px;transition:transform .12s}
.btn:active{transform:scale(.96)}
.btn-ana{background:var(--murdum);color:var(--beyaz);font-size:17px;padding:15px 44px;margin-top:26px;box-shadow:0 6px 0 rgba(67,45,61,.25)}
.btn-kucuk{background:transparent;color:#7a6672;font-size:13px;font-weight:700;padding:10px 16px;text-decoration:underline}
.secim-baslik{font-size:22px;margin:14px 0 4px;text-align:center}
.secim-not{font-size:13px;color:#8a7580;margin-bottom:14px;text-align:center}
.bolum-liste{display:flex;flex-direction:column;gap:12px;width:100%;margin-top:8px}
.bolum-kart{background:var(--beyaz);border-radius:18px;padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;box-shadow:0 3px 10px rgba(67,45,61,.08);transition:transform .15s;border:2px solid transparent}
.bolum-kart:hover{transform:translateX(4px);border-color:var(--adacayi)}
.bolum-ikon{font-size:26px;width:48px;height:48px;background:var(--keten2);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bolum-kart b{font-size:16px;display:block}
.bolum-kart small{font-size:12px;color:#8a7580}
#giydirme{max-width:680px;padding:10px 6px 30px}
.ust-cubuk{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.gorev-rozet{background:var(--murdum);color:var(--beyaz);border-radius:999px;font-size:13px;font-weight:700;padding:8px 16px;display:flex;gap:8px;align-items:center}
.oyun-alani{display:flex;width:100%;gap:5px;align-items:stretch}
.yan-sekmeler{display:flex;flex-direction:column;gap:4px;flex-shrink:0;padding-top:6px;max-height:76vh;overflow-y:auto;scrollbar-width:none}
.sekme{background:var(--beyaz);border:2px solid var(--keten2);border-radius:11px 0 0 11px;padding:8px 7px;font-size:10.5px;font-weight:800;color:#7a6672;cursor:pointer;text-align:right;min-width:70px;transition:all .15s;font-family:'Nunito';line-height:1.15}
.sekme.aktif{background:var(--murdum);color:var(--beyaz);border-color:var(--murdum)}
.sekme.kilitli{opacity:.35;pointer-events:none}
.yan-raf{width:90px;flex-shrink:0;background:var(--beyaz);border-radius:14px;padding:8px 6px;box-shadow:0 3px 10px rgba(67,45,61,.08);overflow-y:auto;max-height:76vh;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin}
.yan-raf .bos{font-size:11px;color:#a08e99;text-align:center;padding:14px 2px;line-height:1.5}
.urun{background:var(--keten);border:2px solid transparent;border-radius:12px;cursor:pointer;padding:4px;position:relative;transition:transform .12s}
.urun:hover{transform:translateY(-2px)}
.urun.secili{border-color:var(--gul);background:#FBF3EF}
.urun.secili::after{content:'✓';position:absolute;top:2px;right:4px;background:var(--gul);color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:800}
.urun img{width:100%;height:82px;object-fit:contain}
.urun small{font-size:9.5px;font-weight:700;color:#7a6672;display:block;text-align:center;line-height:1.2;margin-top:2px}
.cikar{border:2px dashed #cbb9a5;background:var(--keten)}
.cikar div{height:82px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#a08e99}
.sahne{position:relative;flex:1;background:linear-gradient(180deg,#FBF6EC 0%,#F1E7D6 100%);border-radius:20px;overflow:hidden;box-shadow:inset 0 0 0 2px rgba(201,162,94,.25)}
.sahne::before{content:'';position:absolute;left:50%;top:12px;transform:translateX(-50%);width:78%;height:88%;border-radius:200px 200px 0 0;background:rgba(255,253,248,.55);box-shadow:inset 0 0 0 2px rgba(201,140,140,.25)}
.sahne::after{content:'';position:absolute;left:50%;bottom:5%;transform:translateX(-50%);width:48%;height:12px;border-radius:50%;background:rgba(67,45,61,.10)}
.kanvas{position:relative;width:100%;padding-top:133%}
.kanvas img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none}
/* KATMAN SIRASI (alttan üste): beden, ayakkabı, alt, üst, jile/elbise/pijama, yelek, dış giyim, eşarp, takı, çanta */
.k-beden{z-index:1}.k-ayakkabi{z-index:2}.k-alt{z-index:3}.k-ust{z-index:4}
.k-jile{z-index:5}.k-elbise{z-index:5}.k-pijama{z-index:5}
.k-yelek{z-index:6}.k-dis{z-index:7}.k-esarp{z-index:8}.k-taki{z-index:9}.k-canta{z-index:10}
.eylemler{display:flex;gap:10px;width:100%;margin-top:12px}
.btn-tamamla{flex:1;background:var(--gul-koyu);color:#fff;font-size:16px;padding:15px;box-shadow:0 5px 0 rgba(176,113,111,.35)}
.btn-sifirla{background:var(--keten2);color:var(--murdum);font-size:14px;padding:15px 20px}
.perde{position:fixed;inset:0;background:rgba(67,45,61,.45);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.perde.aktif{display:flex}
.sonuc-kart{background:var(--beyaz);border-radius:26px;padding:30px 26px;max-width:360px;width:100%;text-align:center;animation:belir .35s ease;box-shadow:0 20px 60px rgba(0,0,0,.25)}
@keyframes belir{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.yildizlar{font-size:34px;letter-spacing:4px;margin:10px 0 4px;color:var(--altin)}
.yildizlar .sonuk{color:#E4D9C6}
.puan-buyuk{font-size:52px;font-weight:700;font-family:'Fraunces';color:var(--murdum);line-height:1}
.puan-yuz{font-size:15px;color:#8a7580;font-weight:700}
.yorum{margin:14px 0 4px;font-size:15px;color:#5e4a57;line-height:1.45}
.detay{margin-top:12px;font-size:12.5px;color:#8a7580;background:var(--keten);border-radius:14px;padding:10px 12px;text-align:left;line-height:1.7}
.sonuc-eylem{display:flex;gap:10px;margin-top:20px}
.sonuc-eylem .btn{flex:1;font-size:14px;padding:13px}
.btn-tekrar{background:var(--keten2);color:var(--murdum)}
.btn-devam{background:var(--murdum);color:#fff}
.uyari{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);background:var(--murdum);color:#fff;font-size:13.5px;font-weight:700;padding:12px 20px;border-radius:999px;opacity:0;transition:all .3s;z-index:60;max-width:88%;text-align:center}
.uyari.goster{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<section class="ekran aktif" id="e-giris">
  <div class="susleme">✿ ❀ ✿</div>
  <h1 class="logo">Tesettür<br><em>Butiği</em></h1>
  <p class="alt-baslik">Modelini oluştur, her davete uygun zarif ve kapalı kombinler hazırla, puanını topla!</p>
  <button class="btn btn-ana" onclick="ekranGit('e-bolum')">Oyuna Başla</button>
</section>

<section class="ekran" id="e-bolum">
  <h2 class="secim-baslik">Bölüm Seç</h2>
  <p class="secim-not">Nereye gidiyoruz? Kombinini ona göre hazırla</p>
  <div class="bolum-liste" id="bolum-liste"></div>
</section>

<section class="ekran" id="giydirme">
  <div class="ust-cubuk">
    <button class="btn btn-kucuk" onclick="ekranGit('e-bolum')">← Bölümler</button>
    <div class="gorev-rozet"><span id="gorev-ikon"></span><span id="gorev-ad"></span></div>
  </div>
  <div class="oyun-alani">
    <div class="yan-sekmeler" id="yan-sekmeler"></div>
    <div class="yan-raf" id="yan-raf"></div>
    <div class="sahne"><div class="kanvas" id="kanvas"></div></div>
  </div>
  <div class="eylemler">
    <button class="btn btn-sifirla" onclick="sifirla()">Sıfırla</button>
    <button class="btn btn-tamamla" onclick="tamamla()">Kombini Tamamla ✨</button>
  </div>
</section>

<div class="perde" id="perde">
  <div class="sonuc-kart">
    <div class="susleme">✿ ❀ ✿</div>
    <h3 class="serif" style="font-size:22px" id="sonuc-baslik"></h3>
    <div class="yildizlar" id="yildizlar"></div>
    <div class="puan-buyuk" id="puan"></div>
    <div class="puan-yuz">/ 100 puan</div>
    <p class="yorum" id="yorum"></p>
    <div class="detay" id="detay"></div>
    <div class="sonuc-eylem">
      <button class="btn btn-tekrar" onclick="kapatSonuc()">Düzenle</button>
      <button class="btn btn-devam" onclick="kapatSonuc();ekranGit('e-bolum')">Yeni Bölüm</button>
    </div>
  </div>
</div>
<div class="uyari" id="uyari"></div>

const GARDIROP = [
  {
    "id": "elbise_krem_kabarik",
    "ad": "Krem Kabarık Elbise",
    "kategori": "elbise",
    "puan": {
      "davet": 10,
      "okul": 3,
      "kafe": 5,
      "bulusma": 7,
      "sinema": 5,
      "pijama": 1
    }
  }
];

const KARAKTERLER = [
  { id:"ten1", ad:"Ten 1" },{ id:"ten2", ad:"Ten 2" },
  { id:"ten3", ad:"Ten 3" },{ id:"ten4", ad:"Ten 4" }
];
const BOLUMLER = [
  { id:"davet",   ad:"Davet / Düğün",     ikon:"💌", not:"Şık ve zarif olmalı" },
  { id:"okul",    ad:"Okul",              ikon:"📚", not:"Rahat ve sade" },
  { id:"kafe",    ad:"Kafeye Gitmek",     ikon:"☕", not:"Günlük ve tarz" },
  { id:"bulusma", ad:"Arkadaşla Buluşma", ikon:"🌷", not:"Samimi ve güzel" },
  { id:"sinema",  ad:"Sinemaya Gitmek",   ikon:"🎬", not:"Rahat bir kombin" },
  { id:"pijamaP", ad:"Pijama Partisi",    ikon:"🌙", not:"Yumuşacık ve rahat" }
];
const KATEGORILER = [
  { id:"vucut",    ad:"Vücut" },
  { id:"ust",      ad:"Üst" },
  { id:"alt",      ad:"Alt" },
  { id:"jile",     ad:"Jile" },
  { id:"elbise",   ad:"Elbise" },
  { id:"pijama",   ad:"Pijama" },
  { id:"yelek",    ad:"Yelek·Hırka·Ceket" },
  { id:"dis",      ad:"Dış Giyim" },
  { id:"esarp",    ad:"Eşarp" },
  { id:"taki",     ad:"Takı" },
  { id:"ayakkabi", ad:"Ayakkabı" },
  { id:"canta",    ad:"Çanta" }
];

let karakter = "ten1";
let bolum = null;
let aktifKategori = "vucut";
let giyilen = {};
let sonucModu = false;   // kombin onaylandı mı? (takılar gizlenir)

const $ = s => document.querySelector(s);
function ekranGit(id){
  document.querySelectorAll('.ekran').forEach(e=>e.classList.remove('aktif'));
  $('#'+id).classList.add('aktif'); window.scrollTo(0,0);
}
function uyar(msg){
  const u = $('#uyari'); u.textContent = msg; u.classList.add('goster');
  clearTimeout(u._t); u._t = setTimeout(()=>u.classList.remove('goster'), 2600);
}

function kurBolumler(){
  const l = $('#bolum-liste'); l.innerHTML = '';
  BOLUMLER.forEach(b=>{
    const d = document.createElement('div');
    d.className = 'bolum-kart';
    d.innerHTML = `<div class="bolum-ikon">${b.ikon}</div><div><b>${b.ad}</b><small>${b.not}</small></div>`;
    d.onclick = ()=>{
      bolum = b; giyilen = {}; aktifKategori = 'vucut'; sonucModu = false;
      $('#gorev-ikon').textContent = b.ikon; $('#gorev-ad').textContent = b.ad;
      cizKanvas(); cizSekmeler(); cizRaf();
      ekranGit('giydirme');
    };
    l.appendChild(d);
  });
}

function cizKanvas(){
  const k = $('#kanvas'); k.innerHTML = '';
  const katman = (id, cls)=>{
    const im = document.createElement('img');
    im.src = GORSELLER[id]; im.className = cls; k.appendChild(im);
  };
  katman(karakter,'k-beden');
  /* giyim sırası yönergesi:
     alt -> üst -> jile/elbise/pijama -> yelek -> dış giyim -> eşarp; takı en üstte (onayda gizli) */
  [['ayakkabi','k-ayakkabi'],['alt','k-alt'],['ust','k-ust'],
   ['jile','k-jile'],['elbise','k-elbise'],['pijama','k-pijama'],
   ['yelek','k-yelek'],['dis','k-dis'],['esarp','k-esarp'],['canta','k-canta']]
   .forEach(([kat,cls])=>{ if(giyilen[kat]) katman(giyilen[kat], cls); });
  if(giyilen.taki && !sonucModu) katman(giyilen.taki,'k-taki');  // ziynet dışarıda gösterilmez
}

/* çakışan parçalar otomatik çıkar: kişi elbise giyerken üst seçerse elbise kendiliğinden çıkar */
const CAKISMA = {
  elbise:['ust','alt','jile','pijama'],
  pijama:['ust','alt','jile','elbise'],
  jile:  ['alt','elbise','pijama'],
  ust:   ['elbise','pijama'],
  alt:   ['elbise','pijama','jile']
};
function cakisanlariCikar(kat){
  (CAKISMA[kat]||[]).forEach(k=>delete giyilen[k]);
}

function cizSekmeler(){
  const s = $('#yan-sekmeler'); s.innerHTML = '';
  KATEGORILER.forEach(kat=>{
    const b = document.createElement('button');
    b.className = 'sekme' + (kat.id===aktifKategori?' aktif':'');
    b.textContent = kat.ad;
    b.onclick = ()=>{ aktifKategori = kat.id; cizSekmeler(); cizRaf(); };
    s.appendChild(b);
  });
}

function cizRaf(){
  const raf = $('#yan-raf'); raf.innerHTML = '';
  if(aktifKategori === 'vucut'){
    KARAKTERLER.forEach(kr=>{
      const d = document.createElement('div');
      d.className = 'urun' + (karakter===kr.id?' secili':'');
      d.innerHTML = `<img src="${GORSELLER[kr.id]}" alt="${kr.ad}"><small>${kr.ad}</small>`;
      d.onclick = ()=>{ karakter = kr.id; cizKanvas(); cizRaf(); };
      raf.appendChild(d);
    });
    return;
  }
  const urunler = GARDIROP.filter(u=>u.kategori===aktifKategori);
  if(urunler.length===0){
    raf.innerHTML = '<div class="bos">🧵<br>Bu raf boş.<br>Yeni tasarımlar dikiliyor…</div>';
    return;
  }
  const c = document.createElement('div');
  c.className = 'urun cikar';
  c.innerHTML = '<div>✕</div><small>Çıkar</small>';
  c.onclick = ()=>{ delete giyilen[aktifKategori]; sonucModu=false; cizKanvas(); cizSekmeler(); cizRaf(); };
  raf.appendChild(c);
  urunler.forEach(u=>{
    const d = document.createElement('div');
    d.className = 'urun' + (giyilen[aktifKategori]===u.id?' secili':'');
    d.innerHTML = `<img src="${GORSELLER[u.id]}" alt="${u.ad}"><small>${u.ad}</small>`;
    d.onclick = ()=>{
      cakisanlariCikar(u.kategori);            // elbise giyiliyken üst seçilirse elbise otomatik çıkar
      giyilen[u.kategori] = u.id; sonucModu = false;
      cizKanvas(); cizSekmeler(); cizRaf();
    };
    raf.appendChild(d);
  });
}

function sifirla(){ giyilen = {}; sonucModu=false; cizKanvas(); cizSekmeler(); cizRaf(); }

function tamamla(){
  const tamam = giyilen.elbise || giyilen.pijama || giyilen.jile || (giyilen.ust && giyilen.alt);
  if(!tamam){
    uyar('Önce bir kombin tamamla: elbise, pijama, jile ya da üst + alt 🌸'); return;
  }
  if(!giyilen.esarp){
    uyar('Eşarpsız çıkılmaz! Bir eşarp seç 🧕'); return;
  }
  const katlar = ['ust','alt','jile','elbise','pijama','yelek','dis','esarp','ayakkabi','canta','taki'];
  const parcalar = katlar.filter(k=>giyilen[k]).map(k=>GARDIROP.find(u=>u.id===giyilen[k]));
  let toplam = 0, satirlar = [];
  parcalar.forEach(u=>{
    const p = u.puan[bolum.id==='pijamaP'?'pijama':bolum.id] ?? 5;
    toplam += p; satirlar.push(`${u.ad}: <b>${p}/10</b>`);
  });
  let puan = Math.round((toplam/parcalar.length)*10);
  let bonus = 0;
  if(giyilen.ayakkabi) bonus += 2;
  if(giyilen.canta) bonus += 2;
  if(giyilen.taki) bonus += 2;
  puan = Math.min(100, puan+bonus);
  if(bonus>0) satirlar.push(`Aksesuar bonusu: <b>+${bonus}</b>`);

  sonucModu = true; cizKanvas();   // onaylandı: takı artık görünmez

  const y5 = puan>=90?5 : puan>=75?4 : puan>=60?3 : puan>=40?2 : 1;
  let y=''; for(let i=0;i<5;i++) y += i<y5 ? '★' : '<span class="sonuk">★</span>';
  const yorumlar = {
    5:'Muhteşem! Bu kombin tam da bu bölüme göre. Herkes sana hayran kalacak! 🌟',
    4:'Çok güzel bir seçim! Küçük dokunuşlarla mükemmel olabilir. 💐',
    3:'Fena değil ama bu bölüme daha uygun parçalar olabilirdi. 🌸',
    2:'Hmm… Bu kombin bu bölüm için pek uygun görünmüyor. Tekrar dener misin? 🤔',
    1:'Bu kıyafetle oraya gitmek istemezsin bence! Hadi yeniden deneyelim. 😅'
  };
  $('#sonuc-baslik').textContent = bolum.ad;
  $('#yildizlar').innerHTML = y;
  $('#puan').textContent = puan;
  $('#yorum').textContent = yorumlar[y5];
  $('#detay').innerHTML = satirlar.join('<br>') +
    (giyilen.taki ? '<br><i>Takıların dışarıda görünmüyor; ziynet mahremdir 🤍</i>' : '');
  $('#perde').classList.add('aktif');
}
function kapatSonuc(){
  $('#perde').classList.remove('aktif');
  sonucModu = false; cizKanvas();   // düzenlemeye dönünce takı yine görünür
}
kurBolumler();
</script>
