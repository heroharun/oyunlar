<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesettür Butiği — Giydirme Oyunu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --keten:#F5EFE4;      /* zemin */
  --keten2:#EDE4D3;     /* panel */
  --murdum:#432D3D;     /* koyu metin */
  --gul:#C98C8C;        /* vurgu */
  --gul-koyu:#B0716F;
  --adacayi:#A8B48A;    /* ikincil */
  --altin:#C9A25E;
  --beyaz:#FFFDF8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Nunito',system-ui,sans-serif;
  background:var(--keten);
  color:var(--murdum);
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;
}
h1,h2,h3,.serif{font-family:'Fraunces',Georgia,serif}

/* ---------- Ekranlar ---------- */
.ekran{display:none;width:100%;max-width:520px;padding:20px 16px 40px;flex-direction:column;align-items:center}
.ekran.aktif{display:flex}

/* ---------- Başlık ---------- */
.logo{font-size:34px;font-weight:700;letter-spacing:.5px;text-align:center;line-height:1.1;margin-top:26px}
.logo em{font-style:italic;color:var(--gul-koyu)}
.alt-baslik{margin-top:10px;font-size:14px;color:#7a6672;text-align:center;max-width:300px}
.susleme{margin:18px 0 6px;color:var(--altin);letter-spacing:6px;font-size:13px}

/* ---------- Butonlar ---------- */
.btn{
  border:none;cursor:pointer;font-family:'Nunito';font-weight:800;
  border-radius:999px;transition:transform .12s ease, box-shadow .12s ease;
}
.btn:active{transform:scale(.96)}
.btn-ana{
  background:var(--murdum);color:var(--beyaz);
  font-size:17px;padding:15px 44px;margin-top:26px;
  box-shadow:0 6px 0 rgba(67,45,61,.25);
}
.btn-kucuk{background:transparent;color:#7a6672;font-size:13px;font-weight:700;padding:10px 16px;text-decoration:underline}

/* ---------- Karakter seçimi ---------- */
.secim-baslik{font-size:22px;margin:14px 0 4px;text-align:center}
.secim-not{font-size:13px;color:#8a7580;margin-bottom:14px;text-align:center}
.karakter-izgara{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}
.karakter-kart{
  background:var(--beyaz);border:2px solid transparent;border-radius:20px;
  padding:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;
  box-shadow:0 3px 10px rgba(67,45,61,.08);transition:border-color .15s, transform .15s;
}
.karakter-kart:hover{transform:translateY(-3px)}
.karakter-kart.secili{border-color:var(--gul);background:#FBF3EF}
.karakter-kart img{width:100%;height:170px;object-fit:contain;object-position:top}
.karakter-kart span{font-size:13px;font-weight:700;margin-top:6px;color:#7a6672}

/* ---------- Bölüm seçimi ---------- */
.bolum-liste{display:flex;flex-direction:column;gap:12px;width:100%;margin-top:8px}
.bolum-kart{
  background:var(--beyaz);border-radius:18px;padding:16px 18px;cursor:pointer;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 3px 10px rgba(67,45,61,.08);
  transition:transform .15s;border:2px solid transparent;
}
.bolum-kart:hover{transform:translateX(4px);border-color:var(--adacayi)}
.bolum-ikon{font-size:26px;width:48px;height:48px;background:var(--keten2);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bolum-kart b{font-size:16px;display:block}
.bolum-kart small{font-size:12px;color:#8a7580}

/* ---------- Giydirme ekranı ---------- */
#giydirme{max-width:560px;padding:10px 10px 30px}
.ust-cubuk{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.gorev-rozet{
  background:var(--murdum);color:var(--beyaz);border-radius:999px;
  font-size:13px;font-weight:700;padding:8px 16px;display:flex;gap:8px;align-items:center;
}
.sahne{
  position:relative;width:100%;
  background:linear-gradient(180deg,#FBF6EC 0%,#F1E7D6 100%);
  border-radius:26px;overflow:hidden;
  box-shadow:inset 0 0 0 2px rgba(201,162,94,.25);
}
.sahne::before{ /* kemer (arch) */
  content:'';position:absolute;left:50%;top:14px;transform:translateX(-50%);
  width:72%;height:86%;border-radius:200px 200px 0 0;
  background:rgba(255,253,248,.55);
  box-shadow:inset 0 0 0 2px rgba(201,140,140,.25);
}
.sahne::after{ /* podyum */
  content:'';position:absolute;left:50%;bottom:6%;transform:translateX(-50%);
  width:46%;height:14px;border-radius:50%;
  background:rgba(67,45,61,.10);
}
.kanvas{position:relative;width:100%;padding-top:120%;}
.kanvas img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none}
.kanvas img.gizli{display:none}

/* katman sırası */
.k-beden{z-index:1}.k-ayakkabi{z-index:2}.k-alt{z-index:3}.k-ust{z-index:4}.k-elbise{z-index:4}.k-jile{z-index:5}
.k-dis{z-index:6}.k-esarp{z-index:7}.k-canta{z-index:8}

/* ---------- Kategori sekmeleri ---------- */
.sekmeler{
  display:flex;gap:8px;overflow-x:auto;width:100%;padding:14px 2px 10px;
  scrollbar-width:none;
}
.sekmeler::-webkit-scrollbar{display:none}
.sekme{
  flex-shrink:0;background:var(--beyaz);border:2px solid var(--keten2);
  border-radius:999px;padding:9px 16px;font-size:13px;font-weight:800;color:#7a6672;
  cursor:pointer;transition:all .15s;
}
.sekme.aktif{background:var(--murdum);color:var(--beyaz);border-color:var(--murdum)}
.sekme.kilitli{opacity:.4;pointer-events:none}

/* ---------- Gardırop rafı ---------- */
.raf{
  width:100%;background:var(--beyaz);border-radius:20px;padding:14px;
  box-shadow:0 3px 12px rgba(67,45,61,.08);min-height:150px;
}
.raf-bos{display:flex;flex-direction:column;align-items:center;justify-content:center;height:130px;color:#a08e99;font-size:13px;text-align:center;gap:6px}
.raf-bos span{font-size:26px}
.urunler{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px}
.urun{
  background:var(--keten);border:2px solid transparent;border-radius:16px;
  cursor:pointer;padding:6px;position:relative;transition:all .15s;
  display:flex;flex-direction:column;align-items:center;
}
.urun:hover{transform:translateY(-2px)}
.urun.secili{border-color:var(--gul);background:#FBF3EF}
.urun.secili::after{
  content:'✓';position:absolute;top:4px;right:6px;
  background:var(--gul);color:#fff;border-radius:50%;
  width:20px;height:20px;font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:800;
}
.urun img{width:100%;height:96px;object-fit:contain}
.urun small{font-size:11px;font-weight:700;color:#7a6672;margin-top:2px;text-align:center}
.cikar{
  background:var(--keten);border:2px dashed #cbb9a5;
}
.cikar div{height:96px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#a08e99}

/* ---------- Alt eylemler ---------- */
.eylemler{display:flex;gap:10px;width:100%;margin-top:14px}
.btn-tamamla{flex:1;background:var(--gul-koyu);color:#fff;font-size:16px;padding:15px;box-shadow:0 5px 0 rgba(176,113,111,.35)}
.btn-sifirla{background:var(--keten2);color:var(--murdum);font-size:14px;padding:15px 20px}

/* ---------- Sonuç ---------- */
.perde{
  position:fixed;inset:0;background:rgba(67,45,61,.45);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;z-index:50;padding:20px;
}
.perde.aktif{display:flex}
.sonuc-kart{
  background:var(--beyaz);border-radius:26px;padding:30px 26px;max-width:360px;width:100%;
  text-align:center;animation:belir .35s ease;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}
@keyframes belir{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.yildizlar{font-size:34px;letter-spacing:4px;margin:10px 0 4px;color:var(--altin)}
.yildizlar .sonuk{color:#E4D9C6}
.puan-buyuk{font-size:52px;font-weight:700;font-family:'Fraunces';color:var(--murdum);line-height:1}
.puan-yuz{font-size:15px;color:#8a7580;font-weight:700}
.yorum{margin:14px 0 4px;font-size:15px;color:#5e4a57;line-height:1.45}
.detay{margin-top:12px;font-size:12.5px;color:#8a7580;background:var(--keten);border-radius:14px;padding:10px 12px;text-align:left;line-height:1.7}
.sonuc-eylem{display:flex;gap:10px;margin-top:20px}
.sonuc-eylem .btn{flex:1;font-size:14px;padding:13px}
.btn-tekrar{background:var(--keten2);color:var(--murdum)}
.btn-devam{background:var(--murdum);color:#fff}

.uyari{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);
  background:var(--murdum);color:#fff;font-size:13.5px;font-weight:700;
  padding:12px 20px;border-radius:999px;opacity:0;transition:all .3s;z-index:60;
  max-width:88%;text-align:center;
}
.uyari.goster{transform:translateX(-50%) translateY(0);opacity:1}

@media (min-width:560px){
  .karakter-kart img{height:210px}
}
</style>
</head>
<body>

<!-- ═══════════ EKRAN 1: GİRİŞ ═══════════ -->
<section class="ekran aktif" id="e-giris">
  <div class="susleme">✿ ❀ ✿</div>
  <h1 class="logo">Tesettür<br><em>Butiği</em></h1>
  <p class="alt-baslik">Her davete uygun, zarif ve kapalı kombinler hazırla. Kıyafetini seç, puanını topla!</p>
  <button class="btn btn-ana" onclick="ekranGit('e-karakter')">Oyuna Başla</button>
</section>

<!-- ═══════════ EKRAN 2: KARAKTER SEÇ ═══════════ -->
<section class="ekran" id="e-karakter">
  <h2 class="secim-baslik">Karakterini Seç</h2>
  <p class="secim-not">Giydireceğin kızı seç</p>
  <div class="karakter-izgara" id="karakter-izgara"></div>
  <button class="btn btn-ana" id="btn-karakter-devam" style="opacity:.4;pointer-events:none" onclick="ekranGit('e-bolum')">Devam Et</button>
</section>

<!-- ═══════════ EKRAN 3: BÖLÜM SEÇ ═══════════ -->
<section class="ekran" id="e-bolum">
  <h2 class="secim-baslik">Bölüm Seç</h2>
  <p class="secim-not">Nereye gidiyoruz? Kombinini ona göre hazırla</p>
  <div class="bolum-liste" id="bolum-liste"></div>
  <button class="btn btn-kucuk" onclick="ekranGit('e-karakter')">← Karakter değiştir</button>
</section>

<!-- ═══════════ EKRAN 4: GİYDİRME ═══════════ -->
<section class="ekran" id="giydirme">
  <div class="ust-cubuk">
    <button class="btn btn-kucuk" onclick="ekranGit('e-bolum')">← Bölümler</button>
    <div class="gorev-rozet"><span id="gorev-ikon"></span><span id="gorev-ad"></span></div>
  </div>

  <div class="sahne">
    <div class="kanvas" id="kanvas"></div>
  </div>

  <div class="sekmeler" id="sekmeler"></div>
  <div class="raf" id="raf"></div>

  <div class="eylemler">
    <button class="btn btn-sifirla" onclick="sifirla()">Sıfırla</button>
    <button class="btn btn-tamamla" onclick="tamamla()">Kombini Tamamla ✨</button>
  </div>
</section>

<!-- ═══════════ SONUÇ ═══════════ -->
<div class="perde" id="perde">
  <div class="sonuc-kart">
    <div class="susleme">✿ ❀ ✿</div>
    <h3 class="serif" style="font-size:22px" id="sonuc-baslik"></h3>
    <div class="yildizlar" id="yildizlar"></div>
    <div class="puan-buyuk" id="puan"></div>
    <div class="puan-yuz">/ 100 puan</div>
    <p class="yorum" id="yorum"></p>
    <div class="detay" id="detay"></div>
    <div class="sonuc-eylem">
      <button class="btn btn-tekrar" onclick="kapatSonuc()">Düzenle</button>
      <button class="btn btn-devam" onclick="kapatSonuc();ekranGit('e-bolum')">Yeni Bölüm</button>
    </div>
  </div>
</div>

<div class="uyari" id="uyari"></div>

/* ═════════ Oyun durumu ═════════ */
let karakter = null;
let bolum = null;
let aktifKategori = "ust";
let giyilen = {};   // kategori -> urun id

/* ═════════ Yardımcılar ═════════ */
const $ = s => document.querySelector(s);
function ekranGit(id){
  document.querySelectorAll('.ekran').forEach(e=>e.classList.remove('aktif'));
  $('#'+id).classList.add('aktif');
  window.scrollTo(0,0);
}
function uyar(msg){
  const u = $('#uyari');
  u.textContent = msg;
  u.classList.add('goster');
  clearTimeout(u._t);
  u._t = setTimeout(()=>u.classList.remove('goster'), 2400);
}

/* ═════════ Karakter seçimi ═════════ */
function kurKarakterler(){
  const g = $('#karakter-izgara');
  g.innerHTML = '';
  KARAKTERLER.forEach(k=>{
    const d = document.createElement('div');
    d.className = 'karakter-kart';
    d.innerHTML = `<img src="${GORSELLER[k.id]}" alt="${k.ad}"><span>${k.ad}</span>`;
    d.onclick = ()=>{
      karakter = k.id;
      document.querySelectorAll('.karakter-kart').forEach(x=>x.classList.remove('secili'));
      d.classList.add('secili');
      const b = $('#btn-karakter-devam');
      b.style.opacity = 1; b.style.pointerEvents = 'auto';
    };
    g.appendChild(d);
  });
}

/* ═════════ Bölüm seçimi ═════════ */
function kurBolumler(){
  const l = $('#bolum-liste');
  l.innerHTML = '';
  BOLUMLER.forEach(b=>{
    const d = document.createElement('div');
    d.className = 'bolum-kart';
    d.innerHTML = `<div class="bolum-ikon">${b.ikon}</div><div><b>${b.ad}</b><small>${b.not}</small></div>`;
    d.onclick = ()=>{
      bolum = b;
      giyilen = {};
      aktifKategori = 'ust';
      $('#gorev-ikon').textContent = b.ikon;
      $('#gorev-ad').textContent = b.ad;
      cizKanvas(); cizSekmeler(); cizRaf();
      ekranGit('giydirme');
    };
    l.appendChild(d);
  });
}

/* ═════════ Giydirme ═════════ */
function cizKanvas(){
  const k = $('#kanvas');
  k.innerHTML = '';
  const katman = (id, sinif)=>{
    const im = document.createElement('img');
    im.src = GORSELLER[id]; im.className = sinif;
    k.appendChild(im);
  };
  katman(karakter, 'k-beden');
  const sira = [ ['alt','k-alt'], ['elbise','k-elbise'], ['ust','k-ust'], ['jile','k-jile'],
                 ['dis','k-dis'], ['ayakkabi','k-ayakkabi'], ['esarp','k-esarp'], ['canta','k-canta'] ];
  sira.forEach(([kat,cls])=>{ if(giyilen[kat]) katman(giyilen[kat], cls); });
}

function cizSekmeler(){
  const s = $('#sekmeler');
  s.innerHTML = '';
  KATEGORILER.forEach(kat=>{
    const b = document.createElement('button');
    b.className = 'sekme' + (kat.id===aktifKategori?' aktif':'');
    // elbise giyiliyse üst/alt kilitli; üst veya alt giyiliyse elbise kilitli
    if(giyilen.elbise && (kat.id==='ust'||kat.id==='alt'||kat.id==='jile')) b.classList.add('kilitli');
    if((giyilen.ust||giyilen.alt||giyilen.jile) && kat.id==='elbise') b.classList.add('kilitli');
    if((giyilen.alt||giyilen.elbise) && kat.id==='jile') b.classList.add('kilitli');
    if(giyilen.jile && kat.id==='alt') b.classList.add('kilitli');
    b.textContent = kat.ad;
    b.onclick = ()=>{ aktifKategori = kat.id; cizSekmeler(); cizRaf(); };
    s.appendChild(b);
  });
}

function cizRaf(){
  const raf = $('#raf');
  const urunler = GARDIROP.filter(u=>u.kategori===aktifKategori);
  if(urunler.length===0){
    raf.innerHTML = `<div class="raf-bos"><span>🧵</span>Bu raf henüz boş.<br>Yeni tasarımlar dikiliyor…</div>`;
    return;
  }
  raf.innerHTML = '<div class="urunler" id="urunler"></div>';
  const kap = $('#urunler');

  // çıkar seçeneği
  const c = document.createElement('div');
  c.className = 'urun cikar';
  c.innerHTML = `<div>✕</div><small>Çıkar</small>`;
  c.onclick = ()=>{ delete giyilen[aktifKategori]; cizKanvas(); cizSekmeler(); cizRaf(); };
  kap.appendChild(c);

  urunler.forEach(u=>{
    const d = document.createElement('div');
    d.className = 'urun' + (giyilen[aktifKategori]===u.id?' secili':'');
    d.innerHTML = `<img src="${GORSELLER[u.id]}" alt="${u.ad}"><small>${u.ad}</small>`;
    d.onclick = ()=>{
      if(u.kategori==='elbise' && (giyilen.ust||giyilen.alt||giyilen.jile)){
        uyar('Elbise için önce üst, alt ve jileyi çıkarmalısın 👗'); return;
      }
      if((u.kategori==='ust'||u.kategori==='alt') && giyilen.elbise){
        uyar('Üzerinde elbise var, önce onu çıkar 👗'); return;
      }
      if(u.kategori==='jile' && (giyilen.alt||giyilen.elbise)){
        uyar('Jile için önce alt ve elbiseyi çıkarmalısın 🥻'); return;
      }
      if(u.kategori==='alt' && giyilen.jile){
        uyar('Üzerinde jile var, önce onu çıkar 🥻'); return;
      }
      giyilen[aktifKategori] = u.id;
      cizKanvas(); cizSekmeler(); cizRaf();
    };
    kap.appendChild(d);
  });
}

function sifirla(){
  giyilen = {};
  cizKanvas(); cizSekmeler(); cizRaf();
}

/* ═════════ Puanlama ═════════ */
function tamamla(){
  const elbiseli = !!giyilen.elbise;
  const jileli = !!giyilen.jile;
  const ustAltTamam = !!giyilen.ust && !!giyilen.alt;
  if(!elbiseli && !jileli && !ustAltTamam){
    uyar('Önce bir kombin tamamla: elbise, jile ya da üst + alt 🌸');
    return;
  }
  const esarpVar = GARDIROP.some(u=>u.kategori==='esarp');
  if(esarpVar && !giyilen.esarp){
    uyar('Eşarpsız çıkılmaz! Bir eşarp seç 🧕');
    return;
  }

  const parcalar = Object.values(giyilen).map(id=>GARDIROP.find(u=>u.id===id));
  let toplam = 0;
  let satirlar = [];
  parcalar.forEach(u=>{
    const p = u.puan[bolum.id] ?? 5;
    toplam += p;
    satirlar.push(`${u.ad}: <b>${p}/10</b>`);
  });
  const ort = toplam / parcalar.length;          // 0–10
  let puan = Math.round(ort * 10);               // 0–100

  // tamlık bonusu: ayakkabı + çanta gibi ekstra parçalar
  let bonus = 0;
  if(giyilen.ayakkabi) bonus += 3;
  if(giyilen.canta) bonus += 3;
  if(giyilen.dis) bonus += 2;
  puan = Math.min(100, puan + bonus);
  if(bonus>0) satirlar.push(`Aksesuar bonusu: <b>+${bonus}</b>`);

  const yildizSayi = puan>=90?5 : puan>=75?4 : puan>=60?3 : puan>=40?2 : 1;
  let y = '';
  for(let i=0;i<5;i++) y += i<yildizSayi ? '★' : '<span class="sonuk">★</span>';

  const yorumlar = {
    5:'Muhteşem! Bu kombin tam da bu bölüme göre. Herkes sana hayran kalacak! 🌟',
    4:'Çok güzel bir seçim! Küçük dokunuşlarla mükemmel olabilir. 💐',
    3:'Fena değil ama bu bölüme daha uygun parçalar olabilirdi. 🌸',
    2:'Hmm… Bu kombin bu bölüm için pek uygun görünmüyor. Tekrar dener misin? 🤔',
    1:'Bu kıyafetle oraya gitmek istemezsin bence! Hadi yeniden deneyelim. 😅'
  };

  $('#sonuc-baslik').textContent = bolum.ad;
  $('#yildizlar').innerHTML = y;
  $('#puan').textContent = puan;
  $('#yorum').textContent = yorumlar[yildizSayi];
  $('#detay').innerHTML = satirlar.join('<br>');
  $('#perde').classList.add('aktif');
}
function kapatSonuc(){ $('#perde').classList.remove('aktif'); }

/* ═════════ Başlat ═════════ */
kurKarakterler();
kurBolumler();
</script>
