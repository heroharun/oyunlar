<!doctype html>
<html lang="tr">
<meta charset="utf-8">
<title>YILAN — Klasik Atıştırmalık</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  :root{ --bg:#12210f; --board:#1a2f16; --board2:#20381b; --ink:#eaf5e2; --dim:#8fae83;
    --snake:#7ee06a; --snake2:#4db83e; --apple:#ff5f4a; --gold:#ffd166; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:"Avenir Next","Futura","Trebuchet MS",system-ui,sans-serif;
    -webkit-user-select:none;user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent}
  #wrap{height:100%;display:flex;flex-direction:column;align-items:center;gap:8px;
    padding:max(10px,env(safe-area-inset-top)) 10px max(10px,env(safe-area-inset-bottom))}
  #hud{width:min(94vw,440px);display:flex;justify-content:space-between}
  .label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);font-weight:700}
  .value{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
  #board{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;width:100%}
  canvas{display:block;border-radius:12px}
  .hint{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
  .card{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;text-align:center;background:rgba(18,33,15,.94);
    transition:opacity .3s;padding:24px;z-index:10}
  .card.hidden{opacity:0;pointer-events:none;visibility:hidden;transition:opacity .3s,visibility 0s .3s}
  .card.hidden .btn{pointer-events:none}
  .card h1{font-size:clamp(40px,11vw,84px);font-weight:900;line-height:.95;
    background:linear-gradient(180deg,#7ee06a,#2e8f22);
    -webkit-background-clip:text;background-clip:text;color:transparent;transform:rotate(-2deg)}
  .card p{max-width:34ch;color:var(--dim);font-size:14px;line-height:1.5}
  .card .big{font-size:36px;font-weight:800;color:var(--gold)}
  .btn{font:inherit;font-weight:800;font-size:16px;letter-spacing:.08em;text-transform:uppercase;
    color:#12210f;background:linear-gradient(180deg,#7ee06a,#4db83e);border:none;border-radius:999px;
    padding:14px 38px;cursor:pointer;box-shadow:0 5px 0 #2a6b20}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 #2a6b20}
  .btn:focus-visible{outline:3px solid var(--ink);outline-offset:3px}
</style>

<div id="wrap">
  <div id="hud">
    <div><div class="label">Skor</div><div class="value" id="scoreEl">0</div></div>
    <div style="text-align:right"><div class="label">Rekor</div><div class="value" id="bestEl">0</div></div>
  </div>
  <div id="board"><canvas id="cv"></canvas></div>
  <div class="hint" id="ctlHint"></div>
</div>

<div class="card" id="intro">
  <h1>YILAN</h1>
  <p>Elmaları ye, uza, kendine ve duvara çarpma. Yedikçe hızlanırsın!</p>
  <button class="btn" id="startBtn">Başla</button>
  <span class="hint" id="bestIntro"></span>
</div>

<div class="card hidden" id="endcard">
  <h1 style="background:linear-gradient(180deg,#ff8f7a,#c0392b);-webkit-background-clip:text;background-clip:text">Çarptın!</h1>
  <div class="big" id="endScore"></div>
  <p id="endMsg"></p>
  <button class="btn" id="retryBtn">Tekrar</button>
</div>

<script>
'use strict';
const N=17;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let CELL=20, DPR=1;
function resize(){
  DPR=Math.min(devicePixelRatio||1,2);
  const b=document.getElementById('board');
  CELL=Math.floor(Math.min(b.clientWidth,b.clientHeight,460)/N);
  cv.style.width=cv.style.height=CELL*N+'px';
  cv.width=cv.height=CELL*N*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize',()=>{resize();draw();});

let AC=null;
const audio=()=>{ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended')AC.resume(); return AC; };
function blip(f,d=0.07,v=0.15,t='square'){ try{ const a=audio(),n=a.currentTime,o=a.createOscillator(),g=a.createGain();
  o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(0.001,n+d);
  o.connect(g).connect(a.destination);o.start(n);o.stop(n+d+0.02);}catch(e){} }
const buzz=ms=>{ try{ navigator.vibrate&&navigator.vibrate(ms); }catch(e){} };

let snake, dir, nextDir, apple, score, state='intro', stepMs, timer=null, growing;
let best=0; try{ best=+localStorage.getItem('yilan_best')||0; }catch(e){}
document.getElementById('bestEl').textContent=best;
document.getElementById('bestIntro').textContent = best>0?'REKORUN: '+best:'';
const IS_TOUCH=matchMedia('(pointer:coarse)').matches||'ontouchstart' in window;
document.getElementById('ctlHint').textContent = IS_TOUCH?'kaydırarak yön ver':'ok tuşlarıyla yön ver';

function placeApple(){
  do{ apple={x:Math.floor(Math.random()*N),y:Math.floor(Math.random()*N)}; }
  while(snake.some(s=>s.x===apple.x&&s.y===apple.y));
}
function reset(){
  snake=[{x:8,y:9},{x:7,y:9},{x:6,y:9}];
  dir={x:1,y:0}; nextDir=dir; score=0; growing=0; stepMs=170;
  placeApple(); updHud();
}
function updHud(){
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('bestEl').textContent=best;
}
function step(){
  dir=nextDir;
  const h={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if(h.x<0||h.x>=N||h.y<0||h.y>=N||snake.some(s=>s.x===h.x&&s.y===h.y)){ gameOver(); return; }
  snake.unshift(h);
  if(h.x===apple.x&&h.y===apple.y){
    score+=10; growing+=1; placeApple(); updHud();
    blip(600+score,0.08,0.15,'triangle'); buzz(10);
    stepMs=Math.max(75,stepMs-2.5);
    clearInterval(timer); timer=setInterval(tickStep,stepMs);
  }
  if(growing>0) growing--; else snake.pop();
  draw();
}
function tickStep(){ if(state==='play') step(); }
function gameOver(){
  state='over'; clearInterval(timer);
  blip(120,0.4,0.2,'sawtooth'); buzz(80);
  const nb=score>best; if(nb){ best=score; try{localStorage.setItem('yilan_best',best);}catch(e){} }
  document.getElementById('endScore').textContent=score+' puan';
  document.getElementById('endMsg').textContent=(nb?'YENİ REKOR! 🏆 ':'Rekor: '+best+' · ')
    +'Uzunluk: '+snake.length;
  document.getElementById('endcard').classList.remove('hidden');
  updHud();
}
function draw(){
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    ctx.fillStyle=(x+y)%2?'#1a2f16':'#20381b';
    ctx.fillRect(x*CELL,y*CELL,CELL,CELL);
  }
  // elma
  ctx.fillStyle='#ff5f4a';
  ctx.beginPath(); ctx.arc((apple.x+.5)*CELL,(apple.y+.55)*CELL,CELL*0.36,0,6.28); ctx.fill();
  ctx.strokeStyle='#6b8f3e'; ctx.lineWidth=2.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo((apple.x+.5)*CELL,(apple.y+.25)*CELL);
  ctx.quadraticCurveTo((apple.x+.7)*CELL,(apple.y+.05)*CELL,(apple.x+.75)*CELL,(apple.y+.15)*CELL); ctx.stroke();
  // yılan
  for(let i=snake.length-1;i>=0;i--){
    const s=snake[i], t=i/snake.length;
    const pad=CELL*0.08+t*CELL*0.1;
    ctx.fillStyle=i===0?'#8ff07a':`rgb(${77+t*30},${184-t*60},${62})`;
    const r=CELL*0.3;
    const x=s.x*CELL+pad, y=s.y*CELL+pad, w=CELL-pad*2;
    ctx.beginPath(); ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+w,r); ctx.arcTo(x+w,y+w,x,y+w,r);
    ctx.arcTo(x,y+w,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.fill();
  }
  // gözler
  const h=snake[0];
  ctx.fillStyle='#12210f';
  const ex=h.x*CELL+CELL/2+dir.x*CELL*0.15, ey=h.y*CELL+CELL/2+dir.y*CELL*0.15;
  const px=dir.y!==0?CELL*0.18:0, py=dir.x!==0?CELL*0.18:0;
  ctx.beginPath(); ctx.arc(ex-px,ey-py,CELL*0.08,0,6.28); ctx.arc(ex+px,ey+py,CELL*0.08,0,6.28); ctx.fill();
}
function setDir(x,y){
  if(state!=='play') return;
  if(x===-dir.x&&y===-dir.y) return;   // geri dönüş yok
  nextDir={x,y};
}
addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft')setDir(-1,0); if(e.code==='ArrowRight')setDir(1,0);
  if(e.code==='ArrowUp')setDir(0,-1); if(e.code==='ArrowDown')setDir(0,1);
  if(e.code.startsWith('Arrow')) e.preventDefault();
});
let tX=null,tY=null;
addEventListener('touchstart',e=>{ if(e.target.closest('.card'))return;
  const t=e.changedTouches[0]; tX=t.clientX; tY=t.clientY; audio(); },{passive:true});
addEventListener('touchmove',e=>{
  if(tX===null) return;
  const t=e.changedTouches[0], dx=t.clientX-tX, dy=t.clientY-tY;
  if(Math.abs(dx)<24&&Math.abs(dy)<24) return;
  if(Math.abs(dx)>Math.abs(dy)) setDir(Math.sign(dx),0); else setDir(0,Math.sign(dy));
  tX=t.clientX; tY=t.clientY;
},{passive:true});
addEventListener('touchend',()=>{ tX=tY=null; });
document.addEventListener('visibilitychange',()=>{ if(document.hidden&&state==='play'){ clearInterval(timer); state='pausedbg'; }
  else if(state==='pausedbg'){ state='play'; timer=setInterval(tickStep,stepMs); } });

function tap(el,fn){ el._fn=fn;
  const fire=e=>{ e.preventDefault(); e.stopPropagation(); if(el._fn)el._fn(); };
  el.addEventListener('click',fire); el.addEventListener('touchend',fire); }
tap(document.getElementById('startBtn'),()=>{ try{audio();}catch(e){}
  reset(); state='play';
  clearInterval(timer); timer=setInterval(tickStep,stepMs);
  document.getElementById('intro').classList.add('hidden'); });
tap(document.getElementById('retryBtn'),()=>{
  reset(); state='play';
  clearInterval(timer); timer=setInterval(tickStep,stepMs);
  document.getElementById('endcard').classList.add('hidden'); });
resize(); reset(); draw();
</script>
